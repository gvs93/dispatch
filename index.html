<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* =========================================================================
   CONFIGURATION
   ========================================================================= */

// Firebase config - projet kelbongoo-prep (app Dispatch)
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDtcoRoknYM4JrJJfcuhpnVMeS-OurwYdU",
  authDomain: "kelbongoo-prep.firebaseapp.com",
  databaseURL: "https://kelbongoo-prep-default-rtdb.firebaseio.com",
  projectId: "kelbongoo-prep",
  storageBucket: "kelbongoo-prep.firebasestorage.app",
  messagingSenderId: "596701505006",
  appId: "1:596701505006:web:3f2f8d3f0f43ca828e5aff"
};

// URL Apps Script pour envoi du récap (Kelbongoo Distribution Proxy)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj8BOPRY7V_Ni_0a-6YmNA-1HyRAcf0QXAL1FMy04Xnp1W4Am-cNuR4poQOHzu4VCL4Q/exec";

// Durée de verrouillage d'une ligne (ms) - 30s sans renouvellement = auto-déverrouillage
const LOCK_DURATION_MS = 30000;
const LOCK_REFRESH_MS = 10000;

// Liste des opérateurs ayant accès au mode Admin (case-insensitive)
const ADMIN_NAMES = ["henry", "raimbaud"];
const isAdmin = (name) => ADMIN_NAMES.includes((name||"").toLowerCase().trim());

// Init Firebase
let db = null;
let firebaseReady = false;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  firebaseReady = true;
} catch(e) { console.error("Firebase init failed", e); }

/* =========================================================================
   HELPERS
   ========================================================================= */

const fmtTime = (ts) => {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
};

const fmtDuration = (ms) => {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h${(m%60).toString().padStart(2,"0")}`;
  if (m > 0) return `${m}min ${s%60}s`;
  return `${s}s`;
};

const stripAccents = (s) => (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");

// Identifiant stable pour une ligne (basé sur le code article + index pour les cas sans code)
const productKey = (p, idx) => {
  const code = (p.article || "").toString().trim();
  if (code) return `a_${code}`;
  return `l_${idx}`;
};

/* =========================================================================
   EXCEL PARSING
   ========================================================================= */

// Normalise un nom de colonne pour le matching (sans accents, lowercase, trim)
const normCol = (s) => stripAccents((s||"").toString()).toLowerCase().trim();

// Mapping des codes magasin G5 vers nos noms
// Magasin 01 = ROB, Magasin 03 = TOL, Magasin 98 = PDP
const G5_STORE_MAP = {
  "01": "rob",
  "03": "tol",
  "98": "pdp"
};

// Parse une cellule G5 qui peut être au format "07-1-59 ||| 36.000000"
// Retourne le nombre après les ||| ou simplement la valeur si pas de ||| .
const parseG5Cell = (v) => {
  if (v === "" || v === null || v === undefined) return 0;
  const s = v.toString().trim();
  // Format G5 : "XX-Y-ZZZ ||| nombre.000000"
  // On peut avoir plusieurs ||| (ex: "98 ||| 98-1-0000000008 ||| 36.000000")
  // → on prend toujours ce qui est après le DERNIER |||
  const lastSep = s.lastIndexOf("|||");
  let numStr = lastSep >= 0 ? s.substring(lastSep + 3).trim() : s;
  // Format "12u = 2.798000" (autre ancien format) → 12
  const um = numStr.match(/^(\d+)\s*u/);
  if (um) return parseInt(um[1], 10);
  const n = parseFloat(numStr);
  return isNaN(n) ? 0 : Math.round(n); // arrondit (36.000000 -> 36)
};

// Détecte la structure du fichier en cherchant la ligne d'en-têtes
function parseExcelFile(workbook) {
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

  // Fonction helper : détecte si une cellule d'en-tête correspond à un magasin
  // Reconnait: "ROB", "TOL", "PDP" exacts
  //            "Magasin 01/03/98"
  //            "Commande ROB", "Cmd ROB", "ROB Commande", etc.
  const detectStore = (cellNorm) => {
    if (!cellNorm) return null;
    // Match exact
    if (cellNorm === "rob") return "rob";
    if (cellNorm === "tol") return "tol";
    if (cellNorm === "pdp") return "pdp";
    // Magasin XX
    if (cellNorm.startsWith("magasin")) {
      const code = cellNorm.replace("magasin", "").trim();
      if (G5_STORE_MAP[code]) return G5_STORE_MAP[code];
      return null;
    }
    // Mot ROB/TOL/PDP isolé dans un libellé "Commande ROB", "Cmd TOL", "Cde PDP", etc.
    // On split par espaces, tirets, parenthèses
    const tokens = cellNorm.split(/[\s\-_()\/]+/).filter(Boolean);
    if (tokens.includes("rob")) return "rob";
    if (tokens.includes("tol")) return "tol";
    if (tokens.includes("pdp")) return "pdp";
    return null;
  };

  // Cherche la ligne d'en-têtes
  // Plusieurs stratégies pour trouver la ligne d'en-tête :
  // 1. Une ligne contenant désignation/produit/libellé/nom
  // 2. Si pas trouvé, une ligne contenant un mot-clé quantité (commande, cde, qte, etc.)
  let headerIdx = -1;
  let headers = null;

  // Stratégie 1 : recherche d'en-tête classique
  for (let i = 0; i < Math.min(rows.length, 20); i++) {
    const row = rows[i].map(c => normCol(c));
    const hasDesig = row.some(c =>
      c.includes("designation") || c === "produit" || c === "libelle" ||
      c === "libellé" || c === "nom" || c === "article" ||
      c === "description" || c.includes("designation produit")
    );
    if (hasDesig) {
      headerIdx = i;
      headers = rows[i];
      break;
    }
  }

  // Stratégie 2 : si rien trouvé, cherche une ligne avec mots-clés quantité
  // C'est souvent la ligne d'en-tête même si la colonne produit a un nom inhabituel
  if (headerIdx === -1) {
    for (let i = 0; i < Math.min(rows.length, 20); i++) {
      const row = rows[i].map(c => normCol(c));
      const hasQty = row.some(c =>
        c === "quantite" || c === "qte" || c === "qty" ||
        c === "uvc" || c === "cde en uvc" || c === "cde" ||
        c.includes("commande") || detectStore(c) !== null
      );
      // En plus, la ligne doit avoir au moins une colonne non vide qui ressemble à un en-tête
      // (texte court < 50 chars, pas que des chiffres)
      const hasTextHeader = row.some(c => c.length > 0 && c.length < 50 && !/^\d+([.,]\d+)?$/.test(c));
      if (hasQty && hasTextHeader) {
        headerIdx = i;
        headers = rows[i];
        break;
      }
    }
  }

  if (headerIdx === -1) {
    throw new Error("Impossible de trouver une ligne d'en-têtes dans le fichier (cherché : produit/désignation/article/quantité/commande).");
  }

  // Détection de colonne "quantité" générique pour les BDC sans magasin
  // Cherche une colonne nommée "quantité", "qte", "qty", "uvc" (unité commande)
  const detectQuantity = (cellNorm) => {
    if (!cellNorm) return false;
    if (cellNorm === "quantite" || cellNorm === "qte" || cellNorm === "qty") return true;
    if (cellNorm === "commande" || cellNorm === "commande en uvc") return true;
    // Colonnes type "Commande" sans magasin spécifique
    return false;
  };

  // Map des colonnes
  const colMap = {};
  let isG5Format = false;
  let quantityColIdx = -1; // Colonne quantité générique (fallback si pas de magasins)

  // Première passe : on classe les colonnes en évitant les ambiguïtés
  // ("Article" peut être un code ou la désignation selon le fichier)
  const articleAsCode = [];
  const designationCandidates = [];

  headers.forEach((h, idx) => {
    const n = normCol(h);
    if (!n) return;

    // Désignation prioritaire (mots qui signifient clairement nom produit)
    if (n.includes("designation") || n === "produit" || n === "libelle" || n === "libellé" ||
        n === "nom" || n === "description") {
      if (colMap.designation === undefined) colMap.designation = idx;
    }
    // "Article" : on garde en candidat (code OU désignation, on tranche après)
    else if (n === "article") {
      articleAsCode.push(idx);
    }
    // Code/ref article
    else if (n === "code article" || n === "code" || n === "ref" ||
             n === "reference" || n === "référence") {
      if (colMap.article === undefined) colMap.article = idx;
    }
    // Commande (sans nom de magasin)
    else if (detectStore(n) === null && (n.includes("cmd") || n === "commande" ||
             (n.includes("commande") && !detectStore(n)))) {
      if (colMap.cmd === undefined) colMap.cmd = idx;
    }
    // Réception
    else if (n.includes("recept") || n.includes("recu") || n === "reçu") {
      if (colMap.recue === undefined) colMap.recue = idx;
    }
    // Magasins
    else {
      const store = detectStore(n);
      if (store) {
        colMap[store] = idx;
        if (n.startsWith("magasin")) isG5Format = true;
      }
    }
  });

  // Si on n'a pas de désignation mais on a une colonne "Article",
  // analyse le contenu pour décider si c'est un code (chiffres) ou un nom
  if (colMap.designation === undefined && articleAsCode.length > 0) {
    const articleIdx = articleAsCode[0];
    // Regarde les 5 premières lignes de données pour ce champ
    let textCount = 0;
    let numericCount = 0;
    for (let i = headerIdx + 1; i < Math.min(headerIdx + 6, rows.length); i++) {
      const v = (rows[i] && rows[i][articleIdx]) ? String(rows[i][articleIdx]).trim() : "";
      if (!v) continue;
      // Si c'est principalement des chiffres (>= 8 chiffres) = code article
      if (/^\d{6,}$/.test(v)) numericCount++;
      // Si c'est du texte de plus de 5 caractères = désignation
      else if (v.length > 5 && /[a-zA-Z]/.test(v)) textCount++;
    }
    if (textCount > numericCount) {
      colMap.designation = articleIdx;
    } else {
      if (colMap.article === undefined) colMap.article = articleIdx;
    }
  }

  // Si TOUJOURS pas de désignation, on cherche la colonne avec le contenu textuel le plus long
  // (c'est presque sûrement la désignation produit)
  if (colMap.designation === undefined) {
    const usedCols = new Set([colMap.article, colMap.cmd, colMap.recue,
                              colMap.rob, colMap.tol, colMap.pdp].filter(x => x !== undefined));
    let bestIdx = -1;
    let bestAvgLen = 0;
    for (let c = 0; c < headers.length; c++) {
      if (usedCols.has(c)) continue;
      // Calcule longueur moyenne du contenu texte (non vide, non purement numérique)
      let totalLen = 0;
      let count = 0;
      for (let i = headerIdx + 1; i < Math.min(headerIdx + 11, rows.length); i++) {
        const v = (rows[i] && rows[i][c]) ? String(rows[i][c]).trim() : "";
        if (!v) continue;
        if (/^[\d\s.,]+$/.test(v)) continue; // ignore valeurs purement numériques
        totalLen += v.length;
        count++;
      }
      const avg = count > 0 ? totalLen / count : 0;
      if (avg > bestAvgLen && avg > 8) { // au moins 8 caractères en moyenne
        bestAvgLen = avg;
        bestIdx = c;
      }
    }
    if (bestIdx !== -1) {
      colMap.designation = bestIdx;
    }
  }

  // Si pas de magasins détectés → on cherche une colonne "quantité" générique
  const hasAnyStore = colMap.rob !== undefined || colMap.tol !== undefined || colMap.pdp !== undefined;
  if (!hasAnyStore) {
    headers.forEach((h, idx) => {
      const n = normCol(h);
      if (!n) return;
      if (idx === colMap.article || idx === colMap.designation ||
          idx === colMap.cmd || idx === colMap.recue) return;
      // Cherche colonne quantité/qte/uvc/commande/cde
      if (quantityColIdx === -1 && (
        n === "quantite" || n === "qte" || n === "qty" ||
        n === "commande en uvc" || n === "uvc" || n === "uc" ||
        n === "cde en uvc" || n === "cde" ||
        n.includes("cde en uvc") || n.includes("commande en uvc") ||
        (n.includes("quantite") && !n.includes("recept")) ||
        (n.includes("commande") && !detectStore(n)) ||
        (n.startsWith("cde") && !detectStore(n))
      )) {
        quantityColIdx = idx;
      }
    });
    // Si on trouve une quantité, on l'utilise pour PDP
    if (quantityColIdx !== -1) {
      colMap.pdp = quantityColIdx;
    }
    // Sinon, si on a une colonne "commande" (cmd détecté plus haut), on l'utilise pour PDP
    else if (colMap.cmd !== undefined) {
      colMap.pdp = colMap.cmd;
    }
  }

  // Si on n'a pas trouvé de désignation, c'est qu'il y a un problème
  if (colMap.designation === undefined) {
    throw new Error("Impossible de trouver une colonne désignation/produit dans le fichier.");
  }

  // Vérifie qu'on a au moins UNE source de quantité (un magasin OU une quantité)
  if (colMap.rob === undefined && colMap.tol === undefined && colMap.pdp === undefined) {
    throw new Error("Aucune colonne de quantité trouvée. Ajoute une colonne 'Quantité', 'CDE en UVC', 'ROB', 'TOL' ou 'PDP'.");
  }

  // Parse les lignes produit
  const products = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.every(c => c === "" || c === null || c === undefined)) continue;

    const designation = (row[colMap.designation] || "").toString().trim();
    if (!designation) continue;

    // Ignore les lignes de totaux (montant ht, montant ttc, tva, etc.)
    const desigLower = stripAccents(designation.toLowerCase());
    if (desigLower.includes("montant ht") ||
        desigLower.includes("montant ttc") ||
        desigLower.includes("montant tva") ||
        desigLower === "total" ||
        desigLower === "totaux") {
      continue;
    }

    // Parser adapté au format
    const parse = isG5Format ? parseG5Cell : (v) => {
      if (v === "" || v === null || v === undefined) return 0;
      const s = v.toString().trim();
      const m = s.match(/^(\d+)\s*u/);
      if (m) return parseInt(m[1], 10);
      // Gère aussi les nombres avec virgule décimale française "1,5"
      const cleaned = s.replace(",", ".");
      const n = parseFloat(cleaned);
      return isNaN(n) ? 0 : Math.round(n);
    };

    const rob = colMap.rob !== undefined ? parse(row[colMap.rob]) : 0;
    const tol = colMap.tol !== undefined ? parse(row[colMap.tol]) : 0;
    const pdp = colMap.pdp !== undefined ? parse(row[colMap.pdp]) : 0;

    // Si la quantité reçue n'est pas dans le fichier (cas BDC),
    // on la déduit de la somme des magasins
    let recue;
    if (colMap.recue !== undefined) {
      recue = parse(row[colMap.recue]);
    } else {
      recue = rob + tol + pdp;
    }

    // Si la commande n'est pas dans le fichier, on prend la reçue par défaut
    let cmd;
    if (colMap.cmd !== undefined) {
      cmd = parse(row[colMap.cmd]);
    } else {
      cmd = recue;
    }

    // On n'ajoute pas les lignes où tous les magasins sont à 0 (lignes vides ou non commandées)
    if (rob === 0 && tol === 0 && pdp === 0 && recue === 0) continue;

    products.push({
      article: colMap.article !== undefined ? (row[colMap.article] || "").toString().trim() : "",
      designation,
      cmd,
      recue,
      rob,
      tol,
      pdp
    });
  }

  return products;
}

/* =========================================================================
   FIREBASE / STATE SYNC
   ========================================================================= */

// Une session = un dispatch en cours, identifiée par un sessionId
// Structure dans Firebase:
//   /dispatch/{sessionId}/meta : { supplier, startedAt, operators: [...], products: [...] }
//   /dispatch/{sessionId}/state/{productKey} : { done, doneBy, doneAt, lockedBy, lockedAt, qtyRob, qtyTol, qtyPdp }

function useFirebaseSession(sessionId, operatorName) {
  const [state, setState] = useState({});
  const [meta, setMeta] = useState(null);
  const [connected, setConnected] = useState(false);

  useEffect(() => {
    if (!firebaseReady || !sessionId) return;

    const stateRef = db.ref(`dispatch/${sessionId}/state`);
    const metaRef = db.ref(`dispatch/${sessionId}/meta`);
    const connectedRef = db.ref(".info/connected");

    const onState = (snap) => setState(snap.val() || {});
    const onMeta = (snap) => setMeta(snap.val() || null);
    const onConn = (snap) => setConnected(!!snap.val());

    stateRef.on("value", onState);
    metaRef.on("value", onMeta);
    connectedRef.on("value", onConn);

    return () => {
      stateRef.off("value", onState);
      metaRef.off("value", onMeta);
      connectedRef.off("value", onConn);
    };
  }, [sessionId]);

  // Mise à jour locale (fallback si pas Firebase)
  const updateLocal = useCallback((key, patch) => {
    setState(prev => ({ ...prev, [key]: { ...(prev[key] || {}), ...patch } }));
  }, []);

  const lockRow = useCallback((key) => {
    const patch = { lockedBy: operatorName, lockedAt: Date.now() };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, operatorName, updateLocal]);

  const unlockRow = useCallback((key) => {
    const patch = { lockedBy: null, lockedAt: null };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, updateLocal]);

  const validateRow = useCallback((key, qtys) => {
    const patch = {
      done: true,
      doneBy: operatorName,
      doneAt: Date.now(),
      lockedBy: null,
      lockedAt: null,
      ...(qtys || {})
    };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, operatorName, updateLocal]);

  const undoRow = useCallback((key) => {
    const patch = { done: false, doneBy: null, doneAt: null };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, updateLocal]);

  const initSession = useCallback((supplier, products) => {
    const metaData = {
      supplier,
      startedAt: Date.now(),
      products,
    };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/meta`).set(metaData);
    } else {
      setMeta(metaData);
    }
  }, [sessionId]);

  return { state, meta, connected: firebaseReady ? connected : true, lockRow, unlockRow, validateRow, undoRow, initSession };
}

function LoginScreen({ onLogin }) {
  const [name, setName] = useState(localStorage.getItem("dispatch_operator") || "");

  const submit = () => {
    if (!name.trim()) return;
    localStorage.setItem("dispatch_operator", name.trim());
    onLogin(name.trim());
  };

  return (
    <div className="screen-center">
      <div className="logo">Kelbongoo</div>
      <div className="tag">Dispatch Palette</div>
      <div className="card">
        <div className="field">
          <label>Ton prénom</label>
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Ex: Marie"
            autoFocus
            onKeyDown={(e) => e.key === "Enter" && submit()}
          />
        </div>
        <button className="btn-primary" onClick={submit} disabled={!name.trim()}>
          Continuer
        </button>
      </div>
    </div>
  );
}

function UploadScreen({ operator, onSessionStart, onJoinSession, onOpenAdmin, onLogout }) {
  const [error, setError] = useState("");
  const [supplierName, setSupplierName] = useState("");
  const [pendingFile, setPendingFile] = useState(null);
  const fileRef = useRef(null);

  // État du chargement BDC depuis Drive
  const [showBdcModal, setShowBdcModal] = useState(false);
  const [bdcList, setBdcList] = useState([]);
  const [bdcLoading, setBdcLoading] = useState(false);
  const [bdcError, setBdcError] = useState("");
  const [bdcSupplier, setBdcSupplier] = useState("");
  const [loadingBdcId, setLoadingBdcId] = useState(null);

  // Vérifie si une session est déjà active (sessions non terminées, peu importe l'âge)
  const [activeSessions, setActiveSessions] = useState([]);
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref("dispatch");
    const handler = (snap) => {
      const all = snap.val() || {};
      const recent = [];
      Object.entries(all).forEach(([sid, s]) => {
        if (s.meta && s.meta.startedAt) {
          const total = (s.meta.products || []).length;
          const done = Object.values(s.state || {}).filter(x => x && x.done).length;
          // On affiche TOUTES les sessions non terminées (pas de filtre temps)
          if (done < total) {
            recent.push({ id: sid, supplier: s.meta.supplier, startedAt: s.meta.startedAt, total, done });
          }
        }
      });
      recent.sort((a,b) => b.startedAt - a.startedAt);
      setActiveSessions(recent);
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  // Charge la liste des BDC depuis Apps Script
  const openBdcModal = async () => {
    setShowBdcModal(true);
    setBdcLoading(true);
    setBdcError("");
    setBdcList([]);
    try {
      // Apps Script avec no-cors ne renvoie pas de réponse lisible, donc on doit utiliser GET
      const url = `${APPS_SCRIPT_URL}?action=list-bdcs`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.success) {
        setBdcList(data.bdcs || []);
        if ((data.bdcs || []).length === 0) {
          setBdcError("Aucun BDC trouvé dans le dossier Drive (modifié dans les 3 derniers jours, nom contenant 'BDC').");
        }
      } else {
        setBdcError(data.error || "Erreur inconnue");
      }
    } catch (e) {
      setBdcError(`Impossible de charger la liste : ${e.message}`);
    } finally {
      setBdcLoading(false);
    }
  };

  const loadBdc = async (bdc) => {
    if (!bdcSupplier.trim()) {
      setBdcError("Indique d'abord le nom du fournisseur (qui apparaîtra sur les BL).");
      return;
    }
    setLoadingBdcId(bdc.id);
    setBdcError("");
    try {
      const url = `${APPS_SCRIPT_URL}?action=get-bdc&fileId=${encodeURIComponent(bdc.id)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || "Erreur de chargement du BDC");

      // Construit un workbook compatible avec le parseur existant
      const ws = XLSX.utils.aoa_to_sheet(data.rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "BDC");

      const products = parseExcelFile(wb);
      if (products.length === 0) {
        throw new Error("Aucun produit reconnu dans ce BDC (vérifie les en-têtes de colonnes).");
      }

      const supplier = bdcSupplier.trim();
      const sessionId = `${stripAccents(supplier).replace(/[^a-zA-Z0-9]/g, "_").toLowerCase()}_${Date.now()}`;
      setShowBdcModal(false);
      setBdcSupplier("");
      onSessionStart(sessionId, supplier, products);
    } catch (e) {
      setBdcError(e.message);
    } finally {
      setLoadingBdcId(null);
    }
  };

  const handleFileSelected = (file) => {
    if (!file) return;
    if (!supplierName.trim()) {
      setError("Indique d'abord le nom du fournisseur avant de charger le fichier.");
      // Garde le fichier en mémoire pour quand le nom sera entré
      setPendingFile(file);
      return;
    }
    processFile(file, supplierName.trim());
  };

  const processFile = async (file, supplier) => {
    setError("");
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const products = parseExcelFile(wb);
      if (products.length === 0) {
        setError("Aucun produit trouvé dans le fichier.");
        return;
      }
      const sessionId = `${stripAccents(supplier).replace(/[^a-zA-Z0-9]/g, "_").toLowerCase()}_${Date.now()}`;
      onSessionStart(sessionId, supplier, products);
    } catch (e) {
      setError(`Erreur de lecture: ${e.message}`);
    }
  };

  // Si le user a maintenant entré le nom et qu'on avait un fichier en attente
  const handleSupplierConfirm = () => {
    if (!supplierName.trim()) {
      setError("Le nom du fournisseur est obligatoire.");
      return;
    }
    if (pendingFile) {
      processFile(pendingFile, supplierName.trim());
      setPendingFile(null);
    } else {
      fileRef.current?.click();
    }
  };

  return (
    <div className="screen-center">
      <div className="logo">Kelbongoo</div>
      <div className="tag">Bonjour {operator} 👋</div>

      <div className="card">
        <h3 style={{margin: "0 0 12px 0", fontSize: 15}}>Démarrer un nouveau dispatch</h3>

        <div className="field">
          <label>Nom du fournisseur *</label>
          <input
            type="text"
            value={supplierName}
            onChange={(e) => { setSupplierName(e.target.value); setError(""); }}
            placeholder="Ex: SYMBIOSE, GABORIT, TERRE D'OC..."
            style={{textTransform: "uppercase"}}
          />
        </div>

        <div
          className="upload-zone"
          onClick={() => {
            if (!supplierName.trim()) {
              setError("⚠️ Saisis d'abord le nom du fournisseur");
              return;
            }
            fileRef.current?.click();
          }}
          style={{opacity: supplierName.trim() ? 1 : 0.5}}
        >
          <div className="icon">📥</div>
          <div className="label">Charger le fichier Excel</div>
          <div className="hint">.xlsx ou .xls</div>
        </div>
        <input
          ref={fileRef}
          type="file"
          accept=".xlsx,.xls"
          style={{display: "none"}}
          onChange={(e) => handleFileSelected(e.target.files[0])}
        />
        {error && <div style={{color: "#d32f2f", fontSize: 13, marginTop: 12}}>{error}</div>}
      </div>

      {activeSessions.length > 0 && (
        <div className="card" style={{marginTop: 16}}>
          <h3 style={{margin: "0 0 12px 0", fontSize: 15}}>Rejoindre un dispatch en cours</h3>
          {activeSessions.map(s => (
            <button
              key={s.id}
              className="btn-secondary"
              style={{textAlign: "left", padding: 14, marginBottom: 6}}
              onClick={() => onJoinSession(s.id)}
            >
              <div style={{fontWeight: 700, marginBottom: 2}}>{s.supplier}</div>
              <div style={{fontSize: 11, color: "#666"}}>
                Démarré à {fmtTime(s.startedAt)} • {s.done}/{s.total} produits faits
              </div>
            </button>
          ))}
        </div>
      )}

      {isAdmin(operator) && (
        <div style={{marginTop: 16, width: "100%", maxWidth: 360}}>
          <button
            className="btn-secondary"
            onClick={onOpenAdmin}
            style={{background: "#1a4d2e", color: "#fff", fontWeight: 700, padding: 14}}
          >
            🔐 Mode Admin
          </button>
          <button
            className="btn-secondary"
            onClick={openBdcModal}
            style={{background: "#5e35b1", color: "#fff", fontWeight: 700, padding: 14, marginTop: 8}}
          >
            📋 Charger un BDC depuis Drive
          </button>
        </div>
      )}

      <div style={{marginTop: 12, width: "100%", maxWidth: 360}}>
        <button
          className="btn-secondary"
          onClick={onLogout}
          style={{fontSize: 13, color: "#666"}}
        >
          ↪ Se déconnecter ({operator})
        </button>
      </div>

      {!firebaseReady && (
        <div style={{fontSize: 11, color: "#999", marginTop: 16, textAlign: "center", maxWidth: 360}}>
          ⚠️ Firebase non configuré. Mode local uniquement (pas de partage temps réel).
        </div>
      )}

      {/* Modal de chargement BDC */}
      {showBdcModal && (
        <div className="modal-backdrop" onClick={() => !loadingBdcId && setShowBdcModal(false)}>
          <div className="modal" onClick={(e) => e.stopPropagation()} style={{maxWidth: 500}}>
            <h3>📋 Charger un BDC depuis Drive</h3>
            <p style={{fontSize: 12, color: "#666", margin: "0 0 12px 0"}}>
              BDC des 3 derniers jours dans le dossier Drive Kelbongoo.
            </p>

            <div className="field">
              <label>Nom du fournisseur *</label>
              <input
                type="text"
                value={bdcSupplier}
                onChange={(e) => { setBdcSupplier(e.target.value); setBdcError(""); }}
                placeholder="Ex: LE FLEURY"
                style={{textTransform: "uppercase"}}
              />
            </div>

            {bdcLoading && (
              <div style={{textAlign: "center", padding: 20, color: "#666"}}>
                Chargement de la liste...
              </div>
            )}

            {!bdcLoading && bdcList.length > 0 && (
              <div style={{maxHeight: 400, overflowY: "auto", marginBottom: 12}}>
                {bdcList.map(bdc => (
                  <button
                    key={bdc.id}
                    onClick={() => loadBdc(bdc)}
                    disabled={loadingBdcId !== null}
                    style={{
                      width: "100%",
                      textAlign: "left",
                      padding: 12,
                      marginBottom: 6,
                      background: loadingBdcId === bdc.id ? "#e8f5e9" : "#f4f5f7",
                      border: "1.5px solid " + (loadingBdcId === bdc.id ? "#1a4d2e" : "#e6e8ec"),
                      borderRadius: 8,
                      cursor: loadingBdcId !== null ? "wait" : "pointer",
                      opacity: loadingBdcId !== null && loadingBdcId !== bdc.id ? 0.5 : 1
                    }}
                  >
                    <div style={{fontWeight: 700, fontSize: 13, marginBottom: 2}}>
                      {loadingBdcId === bdc.id ? "⏳ " : "📄 "}{bdc.name}
                    </div>
                    <div style={{fontSize: 11, color: "#666"}}>
                      Modifié le {bdc.modifiedStr}
                    </div>
                  </button>
                ))}
              </div>
            )}

            {bdcError && (
              <div style={{
                color: "#c62828",
                background: "#ffebee",
                padding: 10,
                borderRadius: 6,
                fontSize: 12,
                marginBottom: 12
              }}>
                {bdcError}
              </div>
            )}

            <div className="modal-actions">
              <button
                className="btn-cancel"
                onClick={() => setShowBdcModal(false)}
                disabled={loadingBdcId !== null}
              >
                Annuler
              </button>
              <button
                className="btn-confirm"
                onClick={openBdcModal}
                disabled={bdcLoading || loadingBdcId !== null}
              >
                🔄 Actualiser
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ProductCard({ product, pkey, status, operator, onLock, onUnlock, onValidate, onUndo, onEdit }) {
  const isLocked = status.lockedBy && status.lockedBy !== operator;
  const lockExpired = status.lockedAt && (Date.now() - status.lockedAt) > LOCK_DURATION_MS;
  const reallyLocked = isLocked && !lockExpired;
  const isDone = status.done;
  const isMine = status.lockedBy === operator && !lockExpired;

  // Quantités effectives (peuvent avoir été modifiées via le modal)
  const qtyRob = status.qtyRob !== undefined ? status.qtyRob : product.rob;
  const qtyTol = status.qtyTol !== undefined ? status.qtyTol : product.tol;
  const qtyPdp = status.qtyPdp !== undefined ? status.qtyPdp : product.pdp;
  const recue = status.qtyRecue !== undefined ? status.qtyRecue : product.recue;

  const cls = `product-card ${isDone ? "done" : ""} ${reallyLocked ? "locked" : ""} ${isMine ? "mine" : ""}`;

  // Cliquer sur le nom = "je m'en occupe" / "je le libère"
  const handleClaim = () => {
    if (isDone || reallyLocked) return;
    if (isMine) {
      onUnlock(pkey);
    } else {
      onLock(pkey);
    }
  };

  return (
    <div className={cls}>
      {reallyLocked && (
        <div className="lock-badge">🔒 {status.lockedBy} s'en occupe</div>
      )}
      {isMine && !isDone && (
        <div className="lock-badge" style={{background: "#1a4d2e"}}>
          ✋ Tu t'en occupes (tape à nouveau le nom pour libérer)
        </div>
      )}
      {isDone && (
        <div className="done-badge">
          ✓ {status.doneBy} • {fmtTime(status.doneAt)}
        </div>
      )}

      <div
        className="designation"
        onClick={handleClaim}
        style={{
          cursor: (!isDone && !reallyLocked) ? "pointer" : "default",
          userSelect: "none"
        }}
      >
        {product.designation}
      </div>

      <div className="product-meta">
        {product.article && <span className="article">{product.article}</span>}
        <span className="recu">Reçu: {recue}</span>
        {!isDone && !reallyLocked && (
          <button
            onClick={(e) => { e.stopPropagation(); onEdit(pkey, true); }}
            style={{
              background: "#fff3e0", border: "1px solid #ffcc80",
              borderRadius: 4, padding: "2px 6px", fontSize: 10,
              color: "#e65100", fontWeight: 700, cursor: "pointer"
            }}
          >
            ✎ Modifier reçu
          </button>
        )}
      </div>

      <div className="dest-row">
        <div className="dest-cell">
          <div className="name">ROB</div>
          <div className={`qty ${qtyRob === 0 ? "zero" : ""}`}>{qtyRob}</div>
        </div>
        <div className="dest-cell">
          <div className="name">TOL</div>
          <div className={`qty ${qtyTol === 0 ? "zero" : ""}`}>{qtyTol}</div>
        </div>
        <div className="dest-cell">
          <div className="name">PDP</div>
          <div className={`qty ${qtyPdp === 0 ? "zero" : ""}`}>{qtyPdp}</div>
        </div>
      </div>

      {!isDone && !reallyLocked && (
        <div className="actions-row">
          <button
            className="btn-validate"
            onClick={() => onValidate(pkey, { qtyRob, qtyTol, qtyPdp, qtyRecue: recue })}
          >
            ✓ Dispatché
          </button>
          <button className="btn-edit" onClick={() => onEdit(pkey, false)}>
            ✎
          </button>
        </div>
      )}

      {isDone && (
        <div className="actions-row">
          <button className="btn-undo" onClick={() => onUndo(pkey)}>
            Annuler
          </button>
        </div>
      )}

      {reallyLocked && (
        <div style={{fontSize: 12, color: "#888", textAlign: "center", padding: "8px 0"}}>
          {status.lockedBy} est en train de s'en occuper...
        </div>
      )}
    </div>
  );
}

function EditModal({ product, status, onSave, onClose, allowReceivedEdit }) {
  // Important: on stocke en string pour gérer le champ vide pendant la saisie
  const [rob, setRob] = useState(String(status.qtyRob !== undefined ? status.qtyRob : product.rob));
  const [tol, setTol] = useState(String(status.qtyTol !== undefined ? status.qtyTol : product.tol));
  const [pdp, setPdp] = useState(String(status.qtyPdp !== undefined ? status.qtyPdp : product.pdp));
  const [recue, setRecue] = useState(String(status.qtyRecue !== undefined ? status.qtyRecue : product.recue));

  // Convertit string -> nombre (vide = 0)
  const toNum = (s) => {
    if (s === "" || s === null || s === undefined) return 0;
    const n = parseInt(s, 10);
    return isNaN(n) ? 0 : n;
  };

  const robN = toNum(rob);
  const tolN = toNum(tol);
  const pdpN = toNum(pdp);
  const recueN = toNum(recue);
  const total = robN + tolN + pdpN;
  const gap = total - recueN;

  const handleNumChange = (setter) => (e) => {
    const v = e.target.value;
    // Autorise vide, et nombres positifs uniquement
    if (v === "" || /^\d+$/.test(v)) {
      setter(v);
    }
  };

  const handleSave = () => {
    onSave({
      qtyRob: robN,
      qtyTol: tolN,
      qtyPdp: pdpN,
      qtyRecue: recueN
    });
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Ajuster les quantités</h3>
        <div className="designation-modal">{product.designation}</div>

        {allowReceivedEdit && (
          <>
            <div style={{
              background: "#fff3e0", padding: 10, borderRadius: 8,
              marginBottom: 12, border: "1px solid #ffcc80"
            }}>
              <div style={{fontSize: 11, fontWeight: 700, color: "#e65100", marginBottom: 4}}>
                QUANTITÉ REÇUE (BL)
              </div>
              <input
                type="text"
                inputMode="numeric"
                pattern="[0-9]*"
                value={recue}
                onChange={handleNumChange(setRecue)}
                onFocus={(e) => e.target.select()}
                style={{
                  width: "100%", padding: 10, fontSize: 22, fontWeight: 700,
                  textAlign: "center", border: "1.5px solid #ff9800",
                  borderRadius: 6, background: "#fff"
                }}
              />
              <div style={{fontSize: 10, color: "#666", marginTop: 4, textAlign: "center"}}>
                Initial: {product.recue}
              </div>
            </div>
          </>
        )}

        <div style={{fontSize: 12, fontWeight: 600, color: "#666", marginBottom: 6}}>
          RÉPARTITION PAR MAGASIN
        </div>
        <div className="edit-grid">
          <div className="edit-cell">
            <label>ROB</label>
            <input
              type="text"
              inputMode="numeric"
              pattern="[0-9]*"
              value={rob}
              onChange={handleNumChange(setRob)}
              onFocus={(e) => e.target.select()}
            />
          </div>
          <div className="edit-cell">
            <label>TOL</label>
            <input
              type="text"
              inputMode="numeric"
              pattern="[0-9]*"
              value={tol}
              onChange={handleNumChange(setTol)}
              onFocus={(e) => e.target.select()}
            />
          </div>
          <div className="edit-cell">
            <label>PDP</label>
            <input
              type="text"
              inputMode="numeric"
              pattern="[0-9]*"
              value={pdp}
              onChange={handleNumChange(setPdp)}
              onFocus={(e) => e.target.select()}
            />
          </div>
        </div>

        <div style={{
          fontSize: 12, marginBottom: 12, textAlign: "center",
          padding: 8, borderRadius: 6,
          background: gap === 0 ? "#e8f5e9" : "#ffebee",
          color: gap === 0 ? "#1a4d2e" : "#c62828",
          fontWeight: 600
        }}>
          Total réparti: {total} / Reçu: {recueN}
          {gap !== 0 && (
            <div style={{fontSize: 11, marginTop: 2}}>
              {gap > 0 ? `⚠️ Surplus de ${gap}` : `⚠️ Manque ${-gap}`}
            </div>
          )}
          {gap === 0 && <div style={{fontSize: 11, marginTop: 2}}>✓ Total cohérent</div>}
        </div>

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Annuler</button>
          <button className="btn-confirm" onClick={handleSave}>
            Valider
          </button>
        </div>
      </div>
    </div>
  );
}

function DispatchScreen({ sessionId, operator, supplier, products, onFinish, onLeave }) {
  const { state, meta, connected, lockRow, unlockRow, validateRow, undoRow } = useFirebaseSession(sessionId, operator);
  const [search, setSearch] = useState("");
  const [editingKey, setEditingKey] = useState(null);
  const [toast, setToast] = useState("");
  const [viewMode, setViewMode] = useState(localStorage.getItem("dispatch_view_mode") || "list"); // "list" | "scan"
  const [showDone, setShowDone] = useState(false); // onglet Dispatchés
  const searchInputRef = useRef(null);

  // Sauvegarde le mode choisi
  useEffect(() => {
    localStorage.setItem("dispatch_view_mode", viewMode);
  }, [viewMode]);

  // Renouvelle le lock toutes les 10s sur les lignes que je tiens
  useEffect(() => {
    const t = setInterval(() => {
      Object.entries(state).forEach(([k, v]) => {
        if (v && v.lockedBy === operator && !v.done) {
          lockRow(k);
        }
      });
    }, LOCK_REFRESH_MS);
    return () => clearInterval(t);
  }, [state, operator, lockRow]);

  // Tri alphabétique
  const sortedProducts = useMemo(() => {
    return products
      .map((p, idx) => ({ ...p, _pkey: productKey(p, idx) }))
      .sort((a, b) => a.designation.localeCompare(b.designation, "fr"));
  }, [products]);

  // Sépare les produits dispatchés des non dispatchés
  const { notDoneProducts, doneProducts } = useMemo(() => {
    const notDone = [];
    const done = [];
    sortedProducts.forEach(p => {
      if (state[p._pkey]?.done) done.push(p);
      else notDone.push(p);
    });
    return { notDoneProducts: notDone, doneProducts: done };
  }, [sortedProducts, state]);

  // Filtre par recherche selon l'onglet actif
  const filtered = useMemo(() => {
    const source = showDone ? doneProducts : notDoneProducts;
    if (!search.trim()) return source;
    const q = stripAccents(search.toLowerCase());
    return source.filter(p =>
      stripAccents(p.designation.toLowerCase()).includes(q) ||
      (p.article || "").includes(q)
    );
  }, [notDoneProducts, doneProducts, showDone, search]);

  const stats = useMemo(() => {
    const total = sortedProducts.length;
    const done = sortedProducts.filter(p => state[p._pkey]?.done).length;
    return { total, done, remaining: total - done };
  }, [sortedProducts, state]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 1500);
  };

  const handleValidate = (pkey, qtys) => {
    validateRow(pkey, qtys);
    showToast("✓ Validé");
  };

  const handleUndo = (pkey) => {
    undoRow(pkey);
    showToast("↶ Annulé");
  };

  // editMode peut être true = on autorise aussi la modif de la quantité reçue
  const [editAllowReceived, setEditAllowReceived] = useState(false);
  const handleEdit = (pkey, allowReceivedEdit) => {
    lockRow(pkey);
    setEditAllowReceived(!!allowReceivedEdit);
    setEditingKey(pkey);
  };

  const handleEditSave = (qtys) => {
    if (editingKey) {
      validateRow(editingKey, qtys);
      showToast("✓ Ajusté et validé");
    }
    setEditingKey(null);
  };

  const handleEditCancel = () => {
    if (editingKey) unlockRow(editingKey);
    setEditingKey(null);
  };

  const editingProduct = editingKey ? sortedProducts.find(p => p._pkey === editingKey) : null;

  // Quand on est en mode scan et qu'on valide, on vide la recherche pour le prochain produit
  const handleValidateScan = (pkey, qtys) => {
    handleValidate(pkey, qtys);
    if (viewMode === "scan") {
      setSearch("");
      setTimeout(() => searchInputRef.current?.focus(), 50);
    }
  };

  return (
    <div className="app">
      <div className="header">
        <div className="header-row">
          <div>
            <h1>{supplier}</h1>
            <div className="sub">
              {operator} • <span className={`conn-status ${!connected ? "offline" : ""}`}>
                {connected ? "● en ligne" : "● hors ligne"}
              </span>
            </div>
          </div>
          <div className="header-actions">
            <button
              className="header-btn"
              onClick={() => setViewMode(viewMode === "list" ? "scan" : "list")}
              style={{background: viewMode === "scan" ? "#ffb300" : "rgba(255,255,255,.15)"}}
            >
              {viewMode === "scan" ? "📋 Mode liste" : "⚡ Mode scan"}
            </button>
            <button className="header-btn" onClick={onLeave}>Quitter</button>
          </div>
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{width: `${stats.total > 0 ? (stats.done/stats.total)*100 : 0}%`}}></div>
        </div>
        <div className="progress-text" style={{color: "rgba(255,255,255,.85)"}}>
          <span>{stats.done} / {stats.total} produits</span>
          <span>{stats.remaining} restants</span>
        </div>
      </div>

      {/* Onglets À faire / Dispatchés */}
      <div className="tabs-bar">
        <button
          className={`tab ${!showDone ? "active" : ""}`}
          onClick={() => { setShowDone(false); setSearch(""); }}
        >
          À faire ({notDoneProducts.length})
        </button>
        <button
          className={`tab ${showDone ? "active" : ""}`}
          onClick={() => { setShowDone(true); setSearch(""); }}
        >
          ✓ Dispatchés ({doneProducts.length})
        </button>
      </div>

      {/* Mode SCAN : recherche géante centrée, peu de résultats */}
      {viewMode === "scan" && !showDone && (
        <div className="scan-mode">
          <div className="scan-search-wrap">
            <input
              ref={searchInputRef}
              className="scan-search-input"
              type="text"
              placeholder="Tape 2-3 lettres..."
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              autoFocus
            />
            {search && (
              <button className="scan-clear" onClick={() => { setSearch(""); searchInputRef.current?.focus(); }}>
                ✕
              </button>
            )}
          </div>

          {!search.trim() && (
            <div className="scan-hint">
              <div style={{fontSize: 40, marginBottom: 8}}>⚡</div>
              <div style={{fontWeight: 600, marginBottom: 4}}>Mode scan rapide</div>
              <div style={{fontSize: 13, color: "#666"}}>
                Tape les premières lettres du produit que tu tiens dans la main
              </div>
              <div style={{fontSize: 12, color: "#999", marginTop: 12}}>
                {notDoneProducts.length} produits restants
              </div>
            </div>
          )}

          {search.trim() && filtered.length === 0 && (
            <div className="scan-hint">
              <div style={{fontSize: 30, marginBottom: 8}}>🔍</div>
              <div style={{color: "#999"}}>Aucun produit ne correspond à "<b>{search}</b>"</div>
              <div style={{fontSize: 12, color: "#aaa", marginTop: 8}}>
                Vérifie l'orthographe ou bascule en mode liste
              </div>
            </div>
          )}

          {search.trim() && filtered.length > 0 && (
            <div className="scan-results">
              {filtered.slice(0, 5).map(p => (
                <ProductCard
                  key={p._pkey}
                  product={p}
                  pkey={p._pkey}
                  status={state[p._pkey] || {}}
                  operator={operator}
                  onLock={lockRow}
                  onUnlock={unlockRow}
                  onValidate={handleValidateScan}
                  onUndo={handleUndo}
                  onEdit={handleEdit}
                />
              ))}
              {filtered.length > 5 && (
                <div style={{textAlign: "center", color: "#999", fontSize: 12, padding: 8}}>
                  + {filtered.length - 5} autres résultats... précise ta recherche
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Mode LISTE classique ou onglet Dispatchés */}
      {(viewMode === "list" || showDone) && (
        <>
          <div className="search-bar">
            <input
              type="text"
              placeholder={showDone ? "🔍 Chercher dans les dispatchés..." : "🔍 Chercher un produit..."}
              value={search}
              onChange={(e) => setSearch(e.target.value)}
            />
          </div>

          <div className="product-list">
            {filtered.length === 0 && (
              <div style={{textAlign: "center", padding: 40, color: "#999"}}>
                {showDone
                  ? (search.trim() ? "Aucun résultat" : "Aucun produit dispatché pour l'instant")
                  : (search.trim() ? "Aucun résultat" : "🎉 Tous les produits sont dispatchés !")
                }
              </div>
            )}
            {filtered.map(p => (
              <ProductCard
                key={p._pkey}
                product={p}
                pkey={p._pkey}
                status={state[p._pkey] || {}}
                operator={operator}
                onLock={lockRow}
                onUnlock={unlockRow}
                onValidate={handleValidate}
                onUndo={handleUndo}
                onEdit={handleEdit}
              />
            ))}
          </div>
        </>
      )}

      <div className="bottom-bar">
        <div className="stats">
          <span>Avancement: <b>{stats.done}/{stats.total}</b></span>
          <span>{stats.total > 0 ? Math.round((stats.done/stats.total)*100) : 0}%</span>
        </div>
        <button
          className="btn-finish"
          onClick={() => onFinish(state, sortedProducts)}
          disabled={stats.done === 0}
        >
          {stats.done === stats.total ? "✓ Terminer et envoyer le récap" : `Voir le récap (${stats.done} validés)`}
        </button>
      </div>

      {editingProduct && (
        <EditModal
          product={editingProduct}
          status={state[editingKey] || {}}
          allowReceivedEdit={editAllowReceived}
          onSave={handleEditSave}
          onClose={handleEditCancel}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function RecapScreen({ sessionId, operator, supplier, products, state, onClose, onLeave }) {
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [error, setError] = useState("");

  // Analyse
  const analysis = useMemo(() => {
    const total = products.length;
    const done = products.filter(p => state[p._pkey]?.done).length;
    const notDone = products.filter(p => !state[p._pkey]?.done);

    // Timestamps
    const timestamps = products
      .map(p => state[p._pkey]?.doneAt)
      .filter(t => t)
      .sort((a,b) => a - b);
    const startedAt = timestamps[0];
    const endedAt = timestamps[timestamps.length - 1];
    const duration = startedAt && endedAt ? (endedAt - startedAt) : 0;

    // Stats par opérateur
    const byOp = {};
    products.forEach(p => {
      const s = state[p._pkey];
      if (s?.done && s.doneBy) {
        byOp[s.doneBy] = (byOp[s.doneBy] || 0) + 1;
      }
    });

    // Ajustements (quantités modifiées)
    const adjusted = products.filter(p => {
      const s = state[p._pkey];
      if (!s?.done) return false;
      return (
        (s.qtyRob !== undefined && s.qtyRob !== p.rob) ||
        (s.qtyTol !== undefined && s.qtyTol !== p.tol) ||
        (s.qtyPdp !== undefined && s.qtyPdp !== p.pdp) ||
        (s.qtyRecue !== undefined && s.qtyRecue !== p.recue)
      );
    });

    return { total, done, notDone, startedAt, endedAt, duration, byOp, adjusted };
  }, [products, state]);

  const sendRecap = async () => {
    setSending(true);
    setError("");

    const payload = {
      action: "log-dispatch-recap",
      sessionId,
      supplier,
      operator,
      startedAt: analysis.startedAt ? new Date(analysis.startedAt).toISOString() : null,
      endedAt: analysis.endedAt ? new Date(analysis.endedAt).toISOString() : null,
      durationMs: analysis.duration,
      total: analysis.total,
      done: analysis.done,
      notDone: analysis.notDone.length,
      byOperator: analysis.byOp,
      lines: products.map(p => {
        const s = state[p._pkey] || {};
        return {
          article: p.article,
          designation: p.designation,
          recue_initiale: p.recue,
          recue: s.qtyRecue !== undefined ? s.qtyRecue : p.recue,
          rob_prevu: p.rob,
          tol_prevu: p.tol,
          pdp_prevu: p.pdp,
          rob_reel: s.qtyRob !== undefined ? s.qtyRob : p.rob,
          tol_reel: s.qtyTol !== undefined ? s.qtyTol : p.tol,
          pdp_reel: s.qtyPdp !== undefined ? s.qtyPdp : p.pdp,
          done: !!s.done,
          doneBy: s.doneBy || "",
          doneAt: s.doneAt ? new Date(s.doneAt).toISOString() : ""
        };
      })
    };

    try {
      // Apps Script en mode no-cors car redirection
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      setSent(true);
    } catch (e) {
      setError(`Erreur: ${e.message}`);
    } finally {
      setSending(false);
    }
  };

  return (
    <div className="app">
      <div className="header">
        <div className="header-row">
          <div>
            <h1>Récap dispatch</h1>
            <div className="sub">{supplier}</div>
          </div>
          <div className="header-actions">
            <button className="header-btn" onClick={onClose}>← Retour</button>
          </div>
        </div>
      </div>

      <div className="recap-section">
        <div className="recap-card">
          <h3>📊 Avancement</h3>
          <div className="recap-stat">
            <span className="label">Produits totaux</span>
            <span className="value">{analysis.total}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Dispatchés</span>
            <span className="value">{analysis.done}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Non traités</span>
            <span className="value" style={{color: analysis.notDone.length > 0 ? "#d32f2f" : "#1a4d2e"}}>
              {analysis.notDone.length}
            </span>
          </div>
        </div>

        <div className="recap-card">
          <h3>⏱ Temps</h3>
          <div className="recap-stat">
            <span className="label">Début</span>
            <span className="value">{fmtTime(analysis.startedAt)}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Fin</span>
            <span className="value">{fmtTime(analysis.endedAt)}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Durée totale</span>
            <span className="value">{fmtDuration(analysis.duration)}</span>
          </div>
          {analysis.done > 0 && analysis.duration > 0 && (
            <div className="recap-stat">
              <span className="label">Cadence</span>
              <span className="value">
                {(analysis.done / (analysis.duration / 60000)).toFixed(1)} produits/min
              </span>
            </div>
          )}
        </div>

        {Object.keys(analysis.byOp).length > 0 && (
          <div className="recap-card">
            <h3>👥 Par opérateur</h3>
            {Object.entries(analysis.byOp)
              .sort((a,b) => b[1] - a[1])
              .map(([name, count]) => (
                <div className="recap-stat" key={name}>
                  <span className="label">{name}</span>
                  <span className="value">{count} produits</span>
                </div>
              ))}
          </div>
        )}

        {analysis.notDone.length > 0 && (
          <div className="recap-card">
            <h3>⚠️ Non traités ({analysis.notDone.length})</h3>
            {analysis.notDone.map(p => (
              <div className="anomaly-item" key={p._pkey}>
                <div className="product">{p.designation}</div>
                <div className="detail">
                  Reçu: {p.recue} • ROB {p.rob} / TOL {p.tol} / PDP {p.pdp}
                </div>
              </div>
            ))}
          </div>
        )}

        {analysis.adjusted.length > 0 && (
          <div className="recap-card">
            <h3>✎ Quantités ajustées ({analysis.adjusted.length})</h3>
            {analysis.adjusted.map(p => {
              const s = state[p._pkey];
              return (
                <div className="anomaly-item" key={p._pkey}>
                  <div className="product">{p.designation}</div>
                  <div className="detail">
                    Prévu: {p.rob}/{p.tol}/{p.pdp} →
                    Réel: {s.qtyRob ?? p.rob}/{s.qtyTol ?? p.tol}/{s.qtyPdp ?? p.pdp}
                  </div>
                </div>
              );
            })}
          </div>

/* =========================================================================
   ADMIN SCREEN
   ========================================================================= */

function AdminScreen({ operator, onClose, onViewSession }) {
  const [allSessions, setAllSessions] = useState([]);
  const [search, setSearch] = useState("");
  const [tab, setTab] = useState("live"); // live | history | stats
  const [loading, setLoading] = useState(true);

  // Suppression d'une session
  const handleDeleteSession = (s) => {
    const msg = s.isLive
      ? `⚠️ Annuler la session EN COURS "${s.supplier}" ?\n\nLes opérateurs perdront leur travail.`
      : `Supprimer la session "${s.supplier}" du ${new Date(s.startedAt).toLocaleString("fr-FR")} ?`;
    if (!confirm(msg)) return;
    if (firebaseReady) {
      db.ref(`dispatch/${s.id}`).remove().catch(err => alert("Erreur: " + err.message));
    }
  };

  // Suppression en masse de toutes les sessions visibles dans l'onglet courant
  const handleBulkDelete = (sessions, label) => {
    if (sessions.length === 0) return;
    if (!confirm(`⚠️ Supprimer ${sessions.length} session(s) ${label} ?\n\nCette action est irréversible.`)) return;
    if (!confirm(`Confirmer la suppression de ${sessions.length} session(s) ?`)) return;
    if (!firebaseReady) return;

    const updates = {};
    sessions.forEach(s => { updates[s.id] = null; });
    db.ref("dispatch").update(updates).catch(err => alert("Erreur: " + err.message));
  };

  // Charge toutes les sessions
  useEffect(() => {
    if (!firebaseReady) {
      setLoading(false);
      return;
    }
    const ref = db.ref("dispatch");
    const handler = (snap) => {
      const all = snap.val() || {};
      const list = [];
      Object.entries(all).forEach(([sid, s]) => {
        if (!s.meta) return;
        const products = s.meta.products || [];
        const state = s.state || {};
        const total = products.length;
        const done = Object.values(state).filter(x => x && x.done).length;

        // Calcule la durée si fini
        const timestamps = Object.values(state)
          .filter(x => x && x.doneAt)
          .map(x => x.doneAt)
          .sort((a,b) => a - b);
        const firstDone = timestamps[0];
        const lastDone = timestamps[timestamps.length - 1];

        // Opérateurs uniques
        const ops = new Set();
        Object.values(state).forEach(x => {
          if (x && x.doneBy) ops.add(x.doneBy);
        });

        list.push({
          id: sid,
          supplier: s.meta.supplier || "?",
          startedAt: s.meta.startedAt,
          createdBy: s.meta.createdBy || "",
          total,
          done,
          remaining: total - done,
          // "Live" = pas encore terminé (peu importe depuis combien de temps)
          isLive: total > 0 && done < total,
          isFinished: done === total && total > 0,
          firstDone,
          lastDone,
          durationMs: firstDone && lastDone ? (lastDone - firstDone) : 0,
          operators: Array.from(ops),
          products,
          state
        });
      });
      list.sort((a,b) => (b.startedAt || 0) - (a.startedAt || 0));
      setAllSessions(list);
      setLoading(false);
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  const liveSessions = useMemo(() => allSessions.filter(s => s.isLive), [allSessions]);
  const historySessions = useMemo(() => allSessions.filter(s => !s.isLive), [allSessions]);

  const filteredHistory = useMemo(() => {
    if (!search.trim()) return historySessions;
    const q = stripAccents(search.toLowerCase());
    return historySessions.filter(s =>
      stripAccents((s.supplier || "").toLowerCase()).includes(q) ||
      stripAccents((s.createdBy || "").toLowerCase()).includes(q) ||
      s.operators.some(o => stripAccents(o.toLowerCase()).includes(q))
    );
  }, [historySessions, search]);

  // Stats globales
  const stats = useMemo(() => {
    const finished = allSessions.filter(s => s.isFinished && s.durationMs > 0);
    const totalProducts = finished.reduce((sum, s) => sum + s.done, 0);
    const totalMinutes = finished.reduce((sum, s) => sum + (s.durationMs / 60000), 0);
    const avgCadence = totalMinutes > 0 ? (totalProducts / totalMinutes).toFixed(2) : 0;

    // Par fournisseur
    const bySupplier = {};
    finished.forEach(s => {
      if (!bySupplier[s.supplier]) bySupplier[s.supplier] = { count: 0, products: 0, durationMs: 0 };
      bySupplier[s.supplier].count++;
      bySupplier[s.supplier].products += s.done;
      bySupplier[s.supplier].durationMs += s.durationMs;
    });

    // Par opérateur
    const byOperator = {};
    finished.forEach(s => {
      Object.values(s.state).forEach(st => {
        if (st && st.done && st.doneBy) {
          byOperator[st.doneBy] = (byOperator[st.doneBy] || 0) + 1;
        }
      });
    });

    return {
      totalSessions: allSessions.length,
      finishedSessions: finished.length,
      totalProducts,
      avgCadence,
      bySupplier,
      byOperator
    };
  }, [allSessions]);

  return (
    <div className="app">
      <div className="header" style={{background: "#0d3d20"}}>
        <div className="header-row">
          <div>
            <h1>🔐 Mode Admin</h1>
            <div className="sub">{operator} • {allSessions.length} session(s) total</div>
          </div>
          <div className="header-actions">
            <button className="header-btn" onClick={onClose}>← Retour</button>
          </div>
        </div>
      </div>

      <div className="tabs-bar">
        <button className={`tab ${tab === "live" ? "active" : ""}`} onClick={() => setTab("live")}>
          🔴 En cours ({liveSessions.length})
        </button>
        <button className={`tab ${tab === "history" ? "active" : ""}`} onClick={() => setTab("history")}>
          📋 Historique ({historySessions.length})
        </button>
        <button className={`tab ${tab === "stats" ? "active" : ""}`} onClick={() => setTab("stats")}>
          📊 Stats
        </button>
      </div>

      <div style={{padding: 12, paddingBottom: 80}}>
        {loading && <div style={{textAlign: "center", padding: 40, color: "#999"}}>Chargement...</div>}

        {/* ----- ONGLET LIVE ----- */}
        {tab === "live" && !loading && (
          <>
            {liveSessions.length === 0 && (
              <div style={{textAlign: "center", padding: 40, color: "#999"}}>
                Aucun dispatch en cours actuellement
              </div>
            )}
            {liveSessions.map(s => (
              <AdminSessionCard
                key={s.id}
                session={s}
                live={true}
                onClick={() => onViewSession(s)}
                onDelete={handleDeleteSession}
              />
            ))}
            {liveSessions.length > 1 && (
              <button
                onClick={() => handleBulkDelete(liveSessions, "en cours")}
                style={{
                  width: "100%", padding: 10, marginTop: 12,
                  background: "#ffebee", color: "#c62828",
                  border: "1px solid #ffcdd2", borderRadius: 8,
                  fontSize: 13, fontWeight: 600
                }}
              >
                🗑 Annuler toutes les sessions en cours ({liveSessions.length})
              </button>
            )}
          </>
        )}

        {/* ----- ONGLET HISTORIQUE ----- */}
        {tab === "history" && !loading && (
          <>
            <div style={{marginBottom: 12}}>
              <input
                type="text"
                placeholder="🔍 Chercher par fournisseur, opérateur..."
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                style={{
                  width: "100%", padding: 10, fontSize: 14,
                  border: "1.5px solid #ddd", borderRadius: 8
                }}
              />
            </div>
            {filteredHistory.length === 0 && (
              <div style={{textAlign: "center", padding: 40, color: "#999"}}>
                {search ? "Aucun résultat" : "Aucune session terminée"}
              </div>
            )}
            {filteredHistory.map(s => (
              <AdminSessionCard
                key={s.id}
                session={s}
                live={false}
                onClick={() => onViewSession(s)}
                onDelete={handleDeleteSession}
              />
            ))}
            {filteredHistory.length > 1 && (
              <button
                onClick={() => handleBulkDelete(filteredHistory, search ? "filtrée(s)" : "de l'historique")}
                style={{
                  width: "100%", padding: 10, marginTop: 12,
                  background: "#ffebee", color: "#c62828",
                  border: "1px solid #ffcdd2", borderRadius: 8,
                  fontSize: 13, fontWeight: 600
                }}
              >
                🗑 Supprimer {search ? `les ${filteredHistory.length} sessions filtrées` : `toutes les sessions (${filteredHistory.length})`}
              </button>
            )}
          </>
        )}

        {/* ----- ONGLET STATS ----- */}
        {tab === "stats" && !loading && (
          <>
            <div className="recap-card">
              <h3>📊 Vue d'ensemble</h3>
              <div className="recap-stat">
                <span className="label">Total sessions</span>
                <span className="value">{stats.totalSessions}</span>
              </div>
              <div className="recap-stat">
                <span className="label">Sessions terminées</span>
                <span className="value">{stats.finishedSessions}</span>
              </div>
              <div className="recap-stat">
                <span className="label">Produits dispatchés (total)</span>
                <span className="value">{stats.totalProducts}</span>
              </div>
              <div className="recap-stat">
                <span className="label">Cadence moyenne</span>
                <span className="value">{stats.avgCadence} prod/min</span>
              </div>
            </div>

            {Object.keys(stats.bySupplier).length > 0 && (
              <div className="recap-card">
                <h3>🏭 Par fournisseur</h3>
                {Object.entries(stats.bySupplier)
                  .sort((a,b) => b[1].count - a[1].count)
                  .map(([name, s]) => {
                    const cadence = s.durationMs > 0 ? (s.products / (s.durationMs / 60000)).toFixed(1) : "-";
                    return (
                      <div className="recap-stat" key={name}>
                        <span className="label">
                          <b>{name}</b>
                          <div style={{fontSize: 11, color: "#999"}}>
                            {s.count} session(s) • {s.products} prod • {cadence} prod/min
                          </div>
                        </span>
                        <span className="value">{s.count}</span>
                      </div>
                    );
                })}
              </div>
            )}

            {Object.keys(stats.byOperator).length > 0 && (
              <div className="recap-card">
                <h3>👥 Par opérateur</h3>
                {Object.entries(stats.byOperator)
                  .sort((a,b) => b[1] - a[1])
                  .map(([name, count]) => (
                    <div className="recap-stat" key={name}>
                      <span className="label">{name}</span>
                      <span className="value">{count} produits</span>
                    </div>
                  ))}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}
