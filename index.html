function RecapScreen({ sessionId, operator, supplier, products, storeColumns, state, onClose, onLeave }) {
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [error, setError] = useState("");

  // Analyse
  const analysis = useMemo(() => {
    const total = products.length;
    const done = products.filter(p => state[p._pkey]?.done).length;
    const notDone = products.filter(p => !state[p._pkey]?.done);

    // Timestamps
    const timestamps = products
      .map(p => state[p._pkey]?.doneAt)
      .filter(t => t)
      .sort((a,b) => a - b);
    const startedAt = timestamps[0];
    const endedAt = timestamps[timestamps.length - 1];
    const duration = startedAt && endedAt ? (endedAt - startedAt) : 0;

    // Stats par opérateur
    const byOp = {};
    products.forEach(p => {
      const s = state[p._pkey];
      if (s?.done && s.doneBy) {
        byOp[s.doneBy] = (byOp[s.doneBy] || 0) + 1;
      }
    });

    // Helpers pour accéder aux qty effectives par store
    const getEffectiveQty = (state, p, code) => {
      const s = state[p._pkey];
      if (!s) return (p.stores && p.stores[code]) || 0;
      if (s.qtyStores && s.qtyStores[code] !== undefined) return s.qtyStores[code];
      return (p.stores && p.stores[code]) || 0;
    };

    // Ajustements (quantités modifiées)
    const adjusted = products.filter(p => {
      const s = state[p._pkey];
      if (!s?.done) return false;
      // Quantité reçue modifiée ?
      if (s.qtyRecue !== undefined && s.qtyRecue !== p.recue) return true;
      // Au moins un magasin modifié ?
      for (const sc of storeColumns) {
        const initial = (p.stores && p.stores[sc.code]) || 0;
        const effective = getEffectiveQty(state, p, sc.code);
        if (effective !== initial) return true;
      }
      return false;
    });

    return { total, done, notDone, startedAt, endedAt, duration, byOp, adjusted, getEffectiveQty };
  }, [products, state, storeColumns]);

  const sendRecap = async () => {
    setSending(true);
    setError("");

    const payload = {
      action: "log-dispatch-recap",
      sessionId,
      supplier,
      operator,
      startedAt: analysis.startedAt ? new Date(analysis.startedAt).toISOString() : null,
      endedAt: analysis.endedAt ? new Date(analysis.endedAt).toISOString() : null,
      durationMs: analysis.duration,
      total: analysis.total,
      done: analysis.done,
      notDone: analysis.notDone.length,
      byOperator: analysis.byOp,
      storeColumns: storeColumns, // expose la liste des sites dynamiques
      lines: products.map(p => {
        const s = state[p._pkey] || {};
        // Construit les maps stores prévu/réel
        const stores_prevu = {};
        const stores_reel = {};
        for (const sc of storeColumns) {
          stores_prevu[sc.code] = (p.stores && p.stores[sc.code]) || 0;
          stores_reel[sc.code] = analysis.getEffectiveQty(state, p, sc.code);
        }
        // Compat ancienne version : on remplit aussi rob/tol/pdp si présents
        const robPrevu = stores_prevu["ROB"] || 0;
        const tolPrevu = stores_prevu["TOL"] || 0;
        const pdpPrevu = stores_prevu["PDP"] || 0;
        const robReel = stores_reel["ROB"] || 0;
        const tolReel = stores_reel["TOL"] || 0;
        const pdpReel = stores_reel["PDP"] || 0;
        return {
          article: p.article,
          designation: p.designation,
          recue_initiale: p.recue,
          recue: s.qtyRecue !== undefined ? s.qtyRecue : p.recue,
          // Compat
          rob_prevu: robPrevu, tol_prevu: tolPrevu, pdp_prevu: pdpPrevu,
          rob_reel: robReel, tol_reel: tolReel, pdp_reel: pdpReel,
          // Nouveau : map complet
          stores_prevu, stores_reel,
          done: !!s.done,
          doneBy: s.doneBy || "",
          doneAt: s.doneAt ? new Date(s.doneAt).toISOString() : ""
        };
      })
    };

    try {
      // Apps Script en mode no-cors car redirection
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      setSent(true);
    } catch (e) {
      setError(`Erreur: ${e.message}`);
    } finally {
      setSending(false);
    }
  };

  return (
    <div className="app">
      <div className="header">
        <div className="header-row">
          <div>
            <h1>Récap dispatch</h1>
            <div className="sub">{supplier}</div>
          </div>
          <div className="header-actions">
            <button className="header-btn" onClick={onClose}>← Retour</button>
          </div>
        </div>
      </div>

      <div className="recap-section">
        <div className="recap-card">
          <h3>📊 Avancement</h3>
          <div className="recap-stat">
            <span className="label">Produits totaux</span>
            <span className="value">{analysis.total}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Dispatchés</span>
            <span className="value">{analysis.done}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Non traités</span>
            <span className="value" style={{color: analysis.notDone.length > 0 ? "#d32f2f" : "#1a4d2e"}}>
              {analysis.notDone.length}
            </span>
          </div>
        </div>

        <div className="recap-card">
          <h3>⏱ Temps</h3>
          <div className="recap-stat">
            <span className="label">Début</span>
            <span className="value">{fmtTime(analysis.startedAt)}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Fin</span>
            <span className="value">{fmtTime(analysis.endedAt)}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Durée totale</span>
            <span className="value">{fmtDuration(analysis.duration)}</span>
          </div>
          {analysis.done > 0 && analysis.duration > 0 && (
            <div className="recap-stat">
              <span className="label">Cadence</span>
              <span className="value">
                {(analysis.done / (analysis.duration / 60000)).toFixed(1)} produits/min
              </span>
            </div>
          )}
        </div>

        {Object.keys(analysis.byOp).length > 0 && (
          <div className="recap-card">
            <h3>👥 Par opérateur</h3>
            {Object.entries(analysis.byOp)
              .sort((a,b) => b[1] - a[1])
              .map(([name, count]) => (
                <div className="recap-stat" key={name}>
                  <span className="label">{name}</span>
                  <span className="value">{count} produits</span>
                </div>
              ))}
          </div>
        )}

        {analysis.notDone.length > 0 && (
          <div className="recap-card">
            <h3>⚠️ Non traités ({analysis.notDone.length})</h3>
            {analysis.notDone.map(p => (
              <div className="anomaly-item" key={p._pkey}>
                <div className="product">{p.designation}</div>
                <div className="detail">
                  Reçu: {p.recue} •{" "}
                  {storeColumns.map((sc, i) => (
                    <span key={sc.code}>
                      {i > 0 ? " / " : ""}{sc.label} {(p.stores && p.stores[sc.code]) || 0}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {analysis.adjusted.length > 0 && (
          <div className="recap-card">
            <h3>✎ Quantités ajustées ({analysis.adjusted.length})</h3>
            {analysis.adjusted.map(p => {
              const s = state[p._pkey];
              const prevu = storeColumns.map(sc => `${sc.label} ${(p.stores && p.stores[sc.code]) || 0}`).join(" / ");
              const reel = storeColumns.map(sc => `${sc.label} ${analysis.getEffectiveQty(state, p, sc.code)}`).join(" / ");
              return (
                <div className="anomaly-item" key={p._pkey}>
                  <div className="product">{p.designation}</div>
                  <div className="detail">
                    Prévu: {prevu}<br/>
                    Réel: {reel}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div className="recap-card">
          <h3>📤 Envoyer le récap</h3>
          {!sent && (
            <button
              className="btn-primary"
              onClick={sendRecap}
              disabled={sending}
            >
              {sending ? "Envoi en cours..." : "Envoyer au Google Sheet"}
            </button>
          )}
          {sent && (
            <div style={{padding: 12, background: "#e8f5e9", borderRadius: 8, color: "#1a4d2e", fontWeight: 600, textAlign: "center"}}>
              ✓ Envoyé !
            </div>
          )}
          {error && (
            <div style={{padding: 12, background: "#ffebee", borderRadius: 8, color: "#c62828", fontSize: 13, marginTop: 8}}>
              {error}
            </div>
          )}
        </div>

        <div className="recap-card">
          <h3>📄 Bons de Livraison PDF</h3>
          <p style={{fontSize: 12, color: "#666", margin: "0 0 12px 0"}}>
            Génère un BL par site/magasin à imprimer ou envoyer.
          </p>
          {(() => {
            const sessionLike = {
              id: sessionId,
              supplier,
              startedAt: analysis.startedAt,
              createdBy: operator,
              operators: Object.keys(analysis.byOp || {}),
              state
            };
            // Filtre les magasins actifs (avec au moins 1 unité)
            const activeStores = storeColumns.filter(sc => {
              let total = 0;
              products.forEach(p => {
                const q = analysis.getEffectiveQty(state, p, sc.code);
                total += q;
              });
              return total > 0;
            });
            return (
              <>
                <button
                  className="btn-primary"
                  onClick={() => generateAllBLs(sessionLike, products, storeColumns)}
                  style={{marginBottom: 8}}
                >
                  📥 Télécharger tous les BL ({activeStores.length})
                </button>
                <div style={{display: "grid", gridTemplateColumns: `repeat(${Math.min(activeStores.length, 3)}, 1fr)`, gap: 6}}>
                  {activeStores.map(sc => (
                    <button
                      key={sc.code}
                      className="btn-secondary"
                      onClick={() => generateBL(sessionLike, products, sc.code, storeColumns)}
                    >
                      {sc.label}
                    </button>
                  ))}
                </div>
              </>
            );
          })()}
        </div>

        <div className="recap-card">
          <button
            className="btn-secondary"
            onClick={onLeave}
            style={{background: "#1a4d2e", color: "#fff", fontWeight: 600}}
          >
            ← Quitter et revenir à l'accueil
          </button>
          <p style={{fontSize: 11, color: "#999", margin: "8px 0 0 0", textAlign: "center"}}>
            Les données du dispatch restent disponibles dans le mode Admin.
          </p>
        </div>
      </div>
    </div>
  );
}

function AdminScreen({ operator, onClose, onViewSession }) {
  const [allSessions, setAllSessions] = useState([]);
  const [search, setSearch] = useState("");
  const [tab, setTab] = useState("live"); // live | history | stats
  const [loading, setLoading] = useState(true);

  // Suppression d'une session
  const handleDeleteSession = (s) => {
    const msg = s.isLive
      ? `⚠️ Annuler la session EN COURS "${s.supplier}" ?\n\nLes opérateurs perdront leur travail.`
      : `Supprimer la session "${s.supplier}" du ${new Date(s.startedAt).toLocaleString("fr-FR")} ?`;
    if (!confirm(msg)) return;
    if (firebaseReady) {
      db.ref(`dispatch/${s.id}`).remove().catch(err => alert("Erreur: " + err.message));
    }
  };

  // Suppression en masse de toutes les sessions visibles dans l'onglet courant
  const handleBulkDelete = (sessions, label) => {
    if (sessions.length === 0) return;
    if (!confirm(`⚠️ Supprimer ${sessions.length} session(s) ${label} ?\n\nCette action est irréversible.`)) return;
    if (!confirm(`Confirmer la suppression de ${sessions.length} session(s) ?`)) return;
    if (!firebaseReady) return;

    const updates = {};
    sessions.forEach(s => { updates[s.id] = null; });
    db.ref("dispatch").update(updates).catch(err => alert("Erreur: " + err.message));
  };

  // Charge toutes les sessions
  useEffect(() => {
    if (!firebaseReady) {
      setLoading(false);
      return;
    }
    const ref = db.ref("dispatch");
    const handler = (snap) => {
      const all = snap.val() || {};
      const list = [];
      Object.entries(all).forEach(([sid, s]) => {
        if (!s.meta) return;
        const products = s.meta.products || [];
        const state = s.state || {};
        const total = products.length;
        const done = Object.values(state).filter(x => x && x.done).length;

        // Calcule la durée si fini
        const timestamps = Object.values(state)
          .filter(x => x && x.doneAt)
          .map(x => x.doneAt)
          .sort((a,b) => a - b);
        const firstDone = timestamps[0];
        const lastDone = timestamps[timestamps.length - 1];

        // Opérateurs uniques
        const ops = new Set();
        Object.values(state).forEach(x => {
          if (x && x.doneBy) ops.add(x.doneBy);
        });

        list.push({
          id: sid,
          supplier: s.meta.supplier || "?",
          startedAt: s.meta.startedAt,
          createdBy: s.meta.createdBy || "",
          total,
          done,
          remaining: total - done,
          // "Live" = pas encore terminé (peu importe depuis combien de temps)
          isLive: total > 0 && done < total,
          isFinished: done === total && total > 0,
          firstDone,
          lastDone,
          durationMs: firstDone && lastDone ? (lastDone - firstDone) : 0,
          operators: Array.from(ops),
          products,
          state,
          meta: s.meta // contient storeColumns pour AdminSessionDetail
        });
      });
      list.sort((a,b) => (b.startedAt || 0) - (a.startedAt || 0));
      setAllSessions(list);
      setLoading(false);
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  const liveSessions = useMemo(() => allSessions.filter(s => s.isLive), [allSessions]);
  const historySessions = useMemo(() => allSessions.filter(s => !s.isLive), [allSessions]);

  const filteredHistory = useMemo(() => {
    if (!search.trim()) return historySessions;
    const q = stripAccents(search.toLowerCase());
    return historySessions.filter(s =>
      stripAccents((s.supplier || "").toLowerCase()).includes(q) ||
      stripAccents((s.createdBy || "").toLowerCase()).includes(q) ||
      s.operators.some(o => stripAccents(o.toLowerCase()).includes(q))
    );
  }, [historySessions, search]);

  // Stats globales
  const stats = useMemo(() => {
    const finished = allSessions.filter(s => s.isFinished && s.durationMs > 0);
    const totalProducts = finished.reduce((sum, s) => sum + s.done, 0);
    const totalMinutes = finished.reduce((sum, s) => sum + (s.durationMs / 60000), 0);
    const avgCadence = totalMinutes > 0 ? (totalProducts / totalMinutes).toFixed(2) : 0;

    // Par fournisseur
    const bySupplier = {};
    finished.forEach(s => {
      if (!bySupplier[s.supplier]) bySupplier[s.supplier] = { count: 0, products: 0, durationMs: 0 };
      bySupplier[s.supplier].count++;
      bySupplier[s.supplier].products += s.done;
      bySupplier[s.supplier].durationMs += s.durationMs;
    });

    // Par opérateur
    const byOperator = {};
    finished.forEach(s => {
      Object.values(s.state).forEach(st => {
        if (st && st.done && st.doneBy) {
          byOperator[st.doneBy] = (byOperator[st.doneBy] || 0) + 1;
        }
      });
    });

    return {
      totalSessions: allSessions.length,
      finishedSessions: finished.length,
      totalProducts,
      avgCadence,
      bySupplier,
      byOperator
    };
  }, [allSessions]);

  return (
    <div className="app">
      <div className="header" style={{background: "#0d3d20"}}>
        <div className="header-row">
          <div>

        {/* ----- ONGLET STATS ----- */}

/* =========================================================================
   ADMIN SESSION DETAIL (vue détaillée d'une session pour admin)
   ========================================================================= */

function AdminSessionDetail({ session, onClose }) {
  const s = session;
  const date = s.startedAt ? new Date(s.startedAt) : null;
  const dateStr = date ? date.toLocaleString("fr-FR") : "";

  const products = s.products || [];
  // storeColumns vient de la session si stockée, sinon fallback ROB/TOL/PDP
  const storeColumns = useMemo(() => {
    if (s.meta && Array.isArray(s.meta.storeColumns) && s.meta.storeColumns.length > 0) {
      return s.meta.storeColumns;
    }
    // Fallback : si une session ancienne n'a pas storeColumns mais a des produits avec rob/tol/pdp
    return [
      { code: "ROB", label: "ROB", needsNaming: false },
      { code: "TOL", label: "TOL", needsNaming: false },
      { code: "PDP", label: "PDP", needsNaming: false }
    ];
  }, [s.meta]);

  const productsWithKeys = useMemo(() => {
    return products.map((p, idx) => ({ ...p, _pkey: productKey(p, idx) }));
  }, [products]);

  // Helper pour qty effective d'un produit pour un magasin donné
  const getEffectiveQty = (p, code) => {
    const st = s.state[p._pkey];
    if (st && st.qtyStores && st.qtyStores[code] !== undefined) return st.qtyStores[code];
    // Valeurs prévues (parsées du fichier)
    if (p.stores && p.stores[code] !== undefined) return p.stores[code];
    return 0;
  };
  const getPlanned = (p, code) => {
    if (p.stores && p.stores[code] !== undefined) return p.stores[code];
    return 0;
  };

  const doneProducts = productsWithKeys.filter(p => s.state[p._pkey]?.done);
  const notDoneProducts = productsWithKeys.filter(p => !s.state[p._pkey]?.done);
  const adjusted = doneProducts.filter(p => {
    for (const sc of storeColumns) {
      const planned = getPlanned(p, sc.code);
      const real = getEffectiveQty(p, sc.code);
      if (planned !== real) return true;
    }
    return false;
  });

  const handleDelete = () => {
    const msg = s.isLive
      ? `⚠️ ATTENTION : supprimer cette session EN COURS de "${s.supplier}" ?\n\nLes opérateurs qui sont dessus vont perdre leur travail.\n\nCette action est IRRÉVERSIBLE.`
      : `Supprimer définitivement la session "${s.supplier}" du ${dateStr} ?\n\nCette action est irréversible.`;
    if (!confirm(msg)) return;
    if (!confirm("Es-tu vraiment sûr ? Tape OK pour confirmer.")) return;

    if (firebaseReady) {
      db.ref(`dispatch/${s.id}`).remove()
        .then(() => {
          alert("Session supprimée.");
          onClose();
        })
        .catch(err => alert("Erreur: " + err.message));
    } else {
      alert("Firebase non disponible");
    }
  };

  return (
    <div className="app">
      <div className="header" style={{background: "#0d3d20"}}>
        <div className="header-row">
          <div>
            <h1>{s.supplier}</h1>
            <div className="sub">{dateStr}</div>
          </div>
          <div className="header-actions">
            <button className="header-btn" onClick={onClose}>← Retour</button>
          </div>
        </div>
      </div>

      <div style={{padding: 12, paddingBottom: 80}}>
        <div className="recap-card">
          <h3>Vue d'ensemble</h3>
          <div className="recap-stat">
            <span className="label">Créé par</span>
            <span className="value">{s.createdBy || "?"}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Opérateurs</span>
            <span className="value">{s.operators.join(", ") || "-"}</span>
          </div>
          <div className="recap-stat">
            <span className="label">Avancement</span>
            <span className="value">{s.done}/{s.total}</span>
          </div>
          {s.durationMs > 0 && (
            <div className="recap-stat">
              <span className="label">Durée</span>
              <span className="value">{fmtDuration(s.durationMs)}</span>
            </div>
          )}
          {s.durationMs > 0 && s.done > 0 && (
            <div className="recap-stat">
              <span className="label">Cadence</span>
              <span className="value">{(s.done / (s.durationMs / 60000)).toFixed(2)} prod/min</span>
            </div>
          )}
        </div>

        {notDoneProducts.length > 0 && (
          <div className="recap-card">
            <h3>⏳ Non traités ({notDoneProducts.length})</h3>
            {notDoneProducts.map(p => (
              <div className="anomaly-item" key={p._pkey}>
                <div className="product">{p.designation}</div>
                <div className="detail">
                  Reçu: {p.recue} •{" "}
                  {storeColumns.map((sc, i) => (
                    <span key={sc.code}>
                      {i > 0 ? " / " : ""}{sc.label} {getPlanned(p, sc.code)}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {adjusted.length > 0 && (
          <div className="recap-card">
            <h3>✎ Quantités ajustées ({adjusted.length})</h3>
            {adjusted.map(p => {
              const prevu = storeColumns.map(sc => `${sc.label} ${getPlanned(p, sc.code)}`).join(" / ");
              const reel = storeColumns.map(sc => `${sc.label} ${getEffectiveQty(p, sc.code)}`).join(" / ");
              return (
                <div className="anomaly-item" key={p._pkey}>
                  <div className="product">{p.designation}</div>
                  <div className="detail">
                    Prévu: {prevu}<br/>
                    Réel: {reel}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div className="recap-card">
          <h3>📄 Générer les BL PDF</h3>
          {(() => {
            const activeStores = storeColumns.filter(sc => {
              let total = 0;
              productsWithKeys.forEach(p => { total += getEffectiveQty(p, sc.code); });
              return total > 0;
            });
            return (
              <>
                <button
                  className="btn-primary"
                  onClick={() => generateAllBLs(s, productsWithKeys, storeColumns)}
                  style={{marginBottom: 8}}
                >
                  📥 Télécharger tous les BL ({activeStores.length})
                </button>
                <div style={{display: "grid", gridTemplateColumns: `repeat(${Math.min(activeStores.length, 3)}, 1fr)`, gap: 6}}>
                  {activeStores.map(sc => (
                    <button
                      key={sc.code}
                      className="btn-secondary"
                      onClick={() => generateBL(s, productsWithKeys, sc.code, storeColumns)}
                    >
                      {sc.label}
                    </button>
                  ))}
                </div>
              </>
            );
          })()}
        </div>

        {/* Zone dangereuse */}
        <div className="recap-card" style={{border: "1.5px solid #d32f2f"}}>
          <h3 style={{color: "#d32f2f"}}>⚠️ Zone dangereuse</h3>
          <p style={{fontSize: 12, color: "#666", margin: "0 0 12px 0"}}>
            {s.isLive
              ? "Cette session est en cours. La supprimer arrêtera le travail des opérateurs connectés."
              : "Supprimer définitivement cette session de l'historique. Action irréversible."
            }
          </p>
          <button
            className="btn-primary"
            onClick={handleDelete}
            style={{background: "#d32f2f"}}
          >
            🗑 {s.isLive ? "Annuler ce dispatch en cours" : "Supprimer cette session"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   PDF GENERATION (BL par magasin)
   ========================================================================= */

function generateBL(session, productsWithKeys, storeCode, storeColumns) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

  // Trouve le label du magasin
  const storeCol = (storeColumns || []).find(s => s.code === storeCode);
  const storeName = storeCol ? storeCol.label : storeCode;
  // Map des noms longs connus
  const longNames = { ROB: "ROBESPIERRE", TOL: "TOLBIAC", PDP: "PORTE DE PANTIN" };
  const storeFullName = longNames[storeCode] || storeName;

  const date = session.startedAt ? new Date(session.startedAt) : new Date();
  const dateStr = date.toLocaleDateString("fr-FR");

  // Header
  doc.setFillColor(26, 77, 46);
  doc.rect(0, 0, 210, 25, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.setFont(undefined, "bold");
  doc.text("KELBONGOO", 14, 12);
  doc.setFontSize(11);
  doc.setFont(undefined, "normal");
  doc.text("Bon de Livraison Magasin", 14, 19);

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(20);
  doc.setFont(undefined, "bold");
  doc.text(storeName, 196, 15, { align: "right" });

  // Info section
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(10);
  doc.setFont(undefined, "normal");

  let y = 35;
  doc.text(`Magasin destinataire :`, 14, y);
  doc.setFont(undefined, "bold");
  doc.text(storeFullName, 60, y);

  y += 6;
  doc.setFont(undefined, "normal");
  doc.text(`Fournisseur :`, 14, y);
  doc.setFont(undefined, "bold");
  doc.text(session.supplier || "?", 60, y);

  y += 6;
  doc.setFont(undefined, "normal");
  doc.text(`Date dispatch :`, 14, y);
  doc.setFont(undefined, "bold");
  doc.text(dateStr, 60, y);

  y += 6;
  doc.setFont(undefined, "normal");
  doc.text(`Préparé par :`, 14, y);
  doc.setFont(undefined, "bold");
  doc.text((session.operators || []).join(", ") || session.createdBy || "-", 60, y);

  y += 10;

  // Helper pour obtenir la qty effective d'un produit pour ce magasin
  const getQty = (p) => {
    const st = session.state[p._pkey] || {};
    if (st.qtyStores && st.qtyStores[storeCode] !== undefined) return st.qtyStores[storeCode];
    // Compat ancien format
    if (storeCode === "ROB" && st.qtyRob !== undefined) return st.qtyRob;
    if (storeCode === "TOL" && st.qtyTol !== undefined) return st.qtyTol;
    if (storeCode === "PDP" && st.qtyPdp !== undefined) return st.qtyPdp;
    return (p.stores && p.stores[storeCode]) || 0;
  };

  // Filtre les produits avec quantité > 0 pour ce magasin
  const items = productsWithKeys
    .map(p => {
      const st = session.state[p._pkey] || {};
      return { ...p, _qty: getQty(p), _done: !!st.done };
    })
    .filter(p => p._qty > 0)
    .sort((a, b) => a.designation.localeCompare(b.designation, "fr"));

  // Tableau
  doc.autoTable({
    startY: y,
    head: [["Code article", "Désignation", "Quantité", "✓"]],
    body: items.map(p => [
      p.article || "-",
      p.designation,
      String(p._qty),
      p._done ? "✓" : ""
    ]),
    theme: "striped",
    headStyles: {
      fillColor: [26, 77, 46],
      textColor: 255,
      fontStyle: "bold",
      fontSize: 9
    },
    styles: { fontSize: 9, cellPadding: 2 },
    columnStyles: {
      0: { cellWidth: 32, fontStyle: "bold" },
      1: { cellWidth: 110 },
      2: { cellWidth: 20, halign: "center", fontStyle: "bold" },
      3: { cellWidth: 12, halign: "center" }
    },
    margin: { left: 14, right: 14 }
  });

  const totalQty = items.reduce((sum, p) => sum + p._qty, 0);
  const finalY = doc.lastAutoTable.finalY + 5;

  doc.setFillColor(240, 240, 240);
  doc.rect(14, finalY, 182, 10, "F");
  doc.setFontSize(11);
  doc.setFont(undefined, "bold");
  doc.text(`TOTAL : ${items.length} référence(s) — ${totalQty} unité(s)`, 18, finalY + 7);

  const sigY = finalY + 20;
  doc.setFontSize(9);
  doc.setFont(undefined, "normal");
  doc.text("Signature préparateur :", 14, sigY);
  doc.text("Signature réception magasin :", 110, sigY);
  doc.rect(14, sigY + 3, 80, 25);
  doc.rect(110, sigY + 3, 80, 25);

  doc.setFontSize(8);
  doc.setTextColor(150, 150, 150);
  doc.text(
    `Généré le ${new Date().toLocaleString("fr-FR")} • Session: ${session.id}`,
    14, 287
  );

  const safeName = (session.supplier || "").replace(/[^a-zA-Z0-9]/g, "");
  const safeStore = storeCode.replace(/[^a-zA-Z0-9]/g, "");
  const filename = `BL_${safeStore}_${safeName}_${dateStr.replace(/\//g, "-")}.pdf`;
  doc.save(filename);
}

function generateAllBLs(session, productsWithKeys, storeColumns) {
  // Détermine les magasins qui ont au moins 1 unité à dispatcher
  const activeStores = (storeColumns || []).filter(sc => {
    let total = 0;
    productsWithKeys.forEach(p => {
      const st = session.state[p._pkey] || {};
      const q = (st.qtyStores && st.qtyStores[sc.code] !== undefined)
        ? st.qtyStores[sc.code]
        : (p.stores && p.stores[sc.code]) || 0;
      total += q;
    });
    return total > 0;
  });
  if (activeStores.length === 0) {
    alert("Aucun magasin avec des produits à dispatcher.");
    return;
  }
  activeStores.forEach((sc, i) => {
    setTimeout(() => generateBL(session, productsWithKeys, sc.code, storeColumns), i * 300);
  });
}

/* =========================================================================
   NAMING SCREEN — Pour nommer les magasins/sites inconnus
   ========================================================================= */

function NamingScreen({ supplier, products, storeColumns, onConfirm, onCancel }) {
  // Chaque magasin needsNaming a un input pour son nom final
  const [names, setNames] = useState(() => {
    const init = {};
    storeColumns.forEach(s => {
      if (s.needsNaming) {
        init[s.code] = s.label; // valeur initiale = label original
      }
    });
    return init;
  });
  const [error, setError] = useState("");

  const unknown = storeColumns.filter(s => s.needsNaming);
  const known = storeColumns.filter(s => !s.needsNaming);

  // Stats par colonne pour aider l'utilisateur à identifier
  const statsPerColumn = useMemo(() => {
    const stats = {};
    storeColumns.forEach(s => {
      let total = 0, nbProducts = 0;
      products.forEach(p => {
        const q = p.stores[s.code] || 0;
        if (q > 0) {
          total += q;
          nbProducts++;
        }
      });
      stats[s.code] = { total, nbProducts };
    });
    return stats;
  }, [products, storeColumns]);

  const handleConfirm = () => {
    // Vérifier que tous les inconnus ont un nom non vide
    for (const s of unknown) {
      const name = (names[s.code] || "").trim();
      if (!name) {
        setError(`Donne un nom à la colonne "${s.label}"`);
        return;
      }
    }
    // Construit la liste finale de storeColumns
    const finalCols = storeColumns.map(s => {
      if (s.needsNaming) {
        const label = names[s.code].trim();
        // Génère un code propre depuis le label saisi
        const code = stripAccents(label).toUpperCase().replace(/[^A-Z0-9]/g, "_").slice(0, 20);
        return { code, label, needsNaming: false };
      }
      return s;
    });
    // Renomme aussi les codes dans les produits
    const codeMap = {};
    storeColumns.forEach((old, i) => {
      codeMap[old.code] = finalCols[i].code;
    });
    const finalProducts = products.map(p => {
      const newStores = {};
      for (const oldCode in p.stores) {
        const newCode = codeMap[oldCode] || oldCode;
        newStores[newCode] = p.stores[oldCode];
      }
      return { ...p, stores: newStores };
    });
    onConfirm(finalProducts, finalCols);
  };

  return (
    <div className="screen-center" style={{padding: 16}}>
      <div className="card" style={{maxWidth: 500}}>
        <h3 style={{margin: "0 0 8px 0"}}>📋 Identifier les magasins</h3>
        <p style={{fontSize: 13, color: "#666", margin: "0 0 16px 0"}}>
          Fournisseur : <b>{supplier}</b><br/>
          {unknown.length} colonne(s) inconnue(s) trouvée(s). Indique à quel site/magasin elles correspondent.
        </p>

        {known.length > 0 && (
          <div style={{marginBottom: 16, padding: 10, background: "#e8f5e9", borderRadius: 6}}>
            <div style={{fontSize: 11, fontWeight: 700, color: "#1a4d2e", marginBottom: 4}}>
              ✓ MAGASINS RECONNUS AUTOMATIQUEMENT
            </div>
            {known.map(s => (
              <div key={s.code} style={{fontSize: 12, color: "#333"}}>
                • {s.label} ({statsPerColumn[s.code].total} unités sur {statsPerColumn[s.code].nbProducts} produits)
              </div>
            ))}
          </div>
        )}

        {unknown.map(s => (
          <div key={s.code} style={{marginBottom: 16, padding: 12, background: "#fff3e0", borderRadius: 8, border: "1px solid #ffcc80"}}>
            <div style={{fontSize: 11, fontWeight: 700, color: "#e65100", marginBottom: 4}}>
              ⚠️ COLONNE INCONNUE
            </div>
            <div style={{fontSize: 13, marginBottom: 8}}>
              Nom dans le fichier : <b>{s.label}</b><br/>
              <span style={{color: "#666"}}>
                {statsPerColumn[s.code].total} unités sur {statsPerColumn[s.code].nbProducts} produits
              </span>
            </div>
            <label style={{fontSize: 12, fontWeight: 600, color: "#555"}}>
              Sigle ou nom du site/magasin
            </label>
            <input
              type="text"
              value={names[s.code] || ""}
              onChange={(e) => { setNames(prev => ({...prev, [s.code]: e.target.value})); setError(""); }}
              placeholder="Ex: BIC, FOR, PDP, Client X..."
              style={{
                width: "100%", padding: 10, fontSize: 15, marginTop: 4,
                border: "1.5px solid #ddd", borderRadius: 6,
                textTransform: "uppercase"
              }}
            />
          </div>
        ))}

        {error && (
          <div style={{color: "#c62828", background: "#ffebee", padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12}}>
            {error}
          </div>
        )}

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onCancel}>Annuler</button>
          <button className="btn-confirm" onClick={handleConfirm}>
            ✓ Démarrer le dispatch

  );
}

// Une carte produit MU
function MuCard({ item, operator, dateKey, myActive, doneCount, busyBy }) {
  const [phase, setPhase]        = useState(myActive ? (myActive.status === "paused" ? "paused" : "running") : "idle");
  const [inProgress, setInProgress] = useState("");
  const [finalQty,   setFinalQty]   = useState("");

  useEffect(() => {
    if (!myActive) { setPhase("idle"); setInProgress(""); return; }
    const p = myActive.status === "paused" ? "paused" : "running";
    setPhase(p);
    // Toujours resynchroniser inProgress depuis Firebase (survit au reload/resume)
    if (myActive.inProgress != null && myActive.inProgress !== 0)
      setInProgress(String(myActive.inProgress));
  }, [myActive && myActive.id, myActive && myActive.status, myActive && myActive.inProgress]);

  const entRef = () => db.ref(`mu/${dateKey}/entries`);

  const handleStart = () => {
    if (!firebaseReady) { alert("Connexion impossible."); return; }
    entRef().push().set({
      product: item.produit || item.product,
      target:  item.estimation || item.target || 0,
      operator, startedAt: Date.now(), elapsedMs: 0, inProgress: 0, status: "active"
    });
  };

  const handlePause = () => {
    if (!myActive) return;
    const elapsed = (myActive.elapsedMs || 0) + (Date.now() - (myActive.startedAt || Date.now()));
    const ip = parseInt(inProgress, 10) || myActive.inProgress || 0;
    db.ref(`mu/${dateKey}/entries/${myActive.id}`).update({ status: "paused", elapsedMs: elapsed, pausedAt: Date.now(), inProgress: ip });
    setPhase("paused");
  };

  const handleResume = () => {
    if (!myActive) return;
    db.ref(`mu/${dateKey}/entries/${myActive.id}`).update({ status: "active", startedAt: Date.now() });
    setPhase("running");
    // Restaure la quantité en cours depuis Firebase
    if (myActive.inProgress != null) setInProgress(String(myActive.inProgress));
  };

  const handleCancel = () => {
    if (!myActive) return;
    if (!confirm("Annuler cette mise en unité ?")) return;
    db.ref(`mu/${dateKey}/entries/${myActive.id}`).remove();
    setPhase("idle"); setInProgress(""); setFinalQty("");
  };

  const saveInProgress = () => {
    if (!myActive) return;
    const v = parseInt(inProgress, 10);
    if (!isNaN(v) && v >= 0) db.ref(`mu/${dateKey}/entries/${myActive.id}`).update({ inProgress: v });
  };

  const openFinish = () => {
    const ip = parseInt(inProgress, 10) || myActive?.inProgress || 0;
    setFinalQty(String(Math.max(ip, item.estimation || item.target || 0)));
    setPhase("finishing");
  };

  const handleValidate = () => {
    if (!myActive) return;
    const done = Math.max(0, parseInt(finalQty, 10) || 0);
    const finishedAt = Date.now();
    const elapsed = (myActive.elapsedMs || 0) + (phase !== "paused" ? finishedAt - (myActive.startedAt || finishedAt) : 0);
    db.ref(`mu/${dateKey}/entries/${myActive.id}`).update({ status: "done", done, finishedAt, durationMs: elapsed, inProgress: done });
    setPhase("idle"); setInProgress(""); setFinalQty("");
  };

  const estimation = item.estimation || item.target || "—";
  const ip = myActive?.inProgress || 0;
  // progression % pour barre
  const pct = estimation !== "—" && estimation > 0 ? Math.min(100, Math.round(((doneCount + ip) / estimation) * 100)) : 0;

  return (
    <div className={`mu-card ${phase !== "idle" ? "active" : ""} ${phase === "paused" ? "paused" : ""}`}>
      <div className="mu-name">{item.produit || item.product}</div>
      {item.uv && <div style={{fontSize:11,color:"#888",marginBottom:6}}>📏 {item.uv}</div>}

      {/* Barre de progression motivante */}
      <div style={{background:"#e8f5e9",borderRadius:99,height:10,margin:"6px 0 10px",overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:99,background: pct >= 100 ? "#2e7d32" : "#ef6c00",width: pct + "%",transition:"width 0.4s"}} />
      </div>

      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666",marginBottom:8}}>
        <span>🎯 à faire : <b>{estimation}</b></span>
        {doneCount > 0 && <span style={{color:"#2e7d32"}}>✅ {doneCount} fait{doneCount>1?"s":""}</span>}
      </div>

      {!myActive && busyBy.length > 0 && (
        <div style={{fontSize:12,color:"#888",marginBottom:6}}>🧑 {busyBy.join(", ")} est en train de préparer…</div>
      )}

      {/* IDLE */}
      {phase === "idle" && (
        <button className="mu-start" onClick={handleStart}>▶ Je commence !</button>
      )}

      {/* RUNNING */}
      {phase === "running" && (
        <div className="mu-running">
          <div style={{fontSize:13,color:"#ef6c00",fontWeight:700,marginBottom:8}}>🏃 En cours…</div>
          <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",marginBottom:10}}>
            <span style={{fontSize:13,color:"#555"}}>Sachets prêts :</span>
            <input type="number" inputMode="numeric" value={inProgress}
              onChange={e => setInProgress(e.target.value)} onBlur={saveInProgress}
              placeholder="0"
              style={{width:64,textAlign:"center",fontSize:18,fontWeight:700,padding:"5px",borderRadius:8,border:"2px solid #ef6c00"}} />
          </div>
          <div className="btns" style={{gap:8}}>
            <button className="mu-cancel-btn" onClick={handleCancel} title="Annuler">✕</button>
            <button className="mu-pause-btn" onClick={handlePause}>⏸ Pause</button>
            <button className="mu-done-btn" onClick={openFinish}>✓ Terminé !</button>
          </div>
        </div>
      )}

      {/* PAUSED */}
      {phase === "paused" && (
        <div className="mu-running" style={{background:"#fff8e1",borderRadius:8,padding:"10px 0 4px"}}>
          <div style={{fontSize:13,color:"#b45309",fontWeight:700,marginBottom:6}}>⏸ En pause — {ip} sachet{ip>1?"s":""} prêts</div>
          <div className="btns" style={{gap:8}}>
            <button className="mu-cancel-btn" onClick={handleCancel}>✕</button>
            <button className="mu-start" style={{flex:1}} onClick={handleResume}>▶ Je reprends !</button>
            <button className="mu-done-btn" onClick={openFinish}>✓ Terminé !</button>
          </div>
        </div>
      )}

      {/* FINISHING */}
      {phase === "finishing" && (
        <div className="mu-stepper">
          <div className="q" style={{marginBottom:4}}>🎉 Combien de sachets au total ?</div>
          <div style={{fontSize:12,color:"#888",marginBottom:8}}>Estimation : {estimation} · en cours : {ip}</div>
          <div className="row">
            <button className="mu-step-pm" onClick={() => setFinalQty(s => String(Math.max(0,(parseInt(s,10)||0)-1)))}>−</button>
            <input className="mu-step-val" type="number" inputMode="numeric"
              value={finalQty} onChange={e => setFinalQty(e.target.value)} onFocus={e => e.target.select()} />
            <button className="mu-step-pm" onClick={() => setFinalQty(s => String((parseInt(s,10)||0)+1))}>+</button>
          </div>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button className="mu-cancel-btn" style={{flex:"0 0 auto"}} onClick={() => setPhase(myActive?.status==="paused"?"paused":"running")}>← Retour</button>
            <button className="mu-validate" style={{flex:1}} onClick={handleValidate}>✅ Valider</button>
          </div>
        </div>
      )}
    </div>
  );
}


function MUScreen({ operator, onBack, onOpenAdmin, onLogout }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [search, setSearch] = useState("");
  const [entries, setEntries] = useState({}); // { id: entry } pour le jour courant
  const dateKey = todayKey();

  // Charge la liste des FL à mettre en unité depuis le proxy Apps Script
  const loadList = useCallback(async () => {
    setLoading(true);
    setError("");
    try {
      const url = `${FL_PROXY_URL}?action=get-mu-list&sheetId=${MU_SHEET_ID}&tab=${encodeURIComponent("UNIQUEMENT STOCK A REMPLIR PAR PDP ")}&typeCol=TYPE&activeCol=ACTIF+%3F&typeVal=MU`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || "Erreur de lecture de la feuille");
      const list = data.items || [];
      if (list.length === 0) {
        setError("Aucun FL actif de type MU (« m ») trouvé dans la feuille. Vérifie la colonne TYPE et les colonnes détectées : " + (data.headers ? data.headers.join(" | ") : "?"));
      }
      setItems(list);
    } catch (e) {
      setError("Impossible de charger la liste : " + e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadList(); }, [loadList]);

  // Abonnement temps réel aux entrées MU du jour
  const mailSentRef = React.useRef(false); // évite double envoi dans la journée
  useEffect(() => { mailSentRef.current = false; }, [dateKey]); // reset chaque jour

  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref(`mu/${dateKey}/entries`);
    const handler = (snap) => {
      const all = snap.val() || {};
      const map = {};
      Object.entries(all).forEach(([id, e]) => { if (e) map[id] = { id, ...e }; });
      setEntries(map);
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, [dateKey]);

  // Envoi automatique du récap quand TOUS les produits MU sont terminés
  useEffect(() => {
    if (mailSentRef.current) return;
    if (!items.length) return;
    const vals = Object.values(entries);
    // Un produit est "terminé" si au moins une entrée done existe pour lui
    const doneProducts = new Set(vals.filter(e => e.status === "done").map(e => e.product));
    const planned = items.filter(it => it.estimation != null && it.estimation > 0);
    const allDone = planned.length > 0 && planned.every(it => doneProducts.has(it.produit || it.product));
    if (!allDone) return;
    mailSentRef.current = true;
    // Calcule le récap
    const doneEntries = vals.filter(e => e.status === "done");
    const byOp = {}, byProd = {};
    doneEntries.forEach(e => {
      if (!byOp[e.operator]) byOp[e.operator] = { sachets:0, durationMs:0, produits:[] };
      byOp[e.operator].sachets    += e.done || 0;
      byOp[e.operator].durationMs += e.durationMs || 0;
      byOp[e.operator].produits.push(e.product);
      if (!byProd[e.product]) byProd[e.product] = { target: e.target||0, done:0, operators:[] };
      byProd[e.product].done += e.done || 0;
      if (!byProd[e.product].operators.includes(e.operator)) byProd[e.product].operators.push(e.operator);
    });
    const byOperator = Object.entries(byOp).map(([name,v]) => ({
      name, ...v, cadence: v.durationMs > 0 ? (v.sachets/(v.durationMs/3600000)).toFixed(0) : "-"
    }));
    const byProduct  = Object.entries(byProd).map(([product,v]) => ({ product, ...v }));
    const total      = doneEntries.reduce((s,e) => s + (e.done||0), 0);
    const durationMs = doneEntries.reduce((s,e) => s + (e.durationMs||0), 0);
    fetch(FL_PROXY_URL, { method:"POST", body: JSON.stringify({
      secret: FRESHDESK_SECRET, action: "mail_mu_recap",
      day: dateKey, total, durationMs, byOperator, byProduct, entries: doneEntries
    }) }).catch(() => {}); // silencieux — on ne bloque pas l'UI
  }, [entries, items]);

  // Index par produit : compteurs faits + qui est en cours + ma session active
  const byProduct = useMemo(() => {
    const idx = {};
    // Passe 1 : pour chaque produit, garder la dernière entrée done (finishedAt le plus grand)
    // et l'entrée active/paused en cours pour l'opérateur courant.
    Object.values(entries).forEach(e => {
      const p = e.product;
      if (!p) return;
      if (!idx[p]) idx[p] = { lastDone: null, doneCount: 0, busy: [], mine: null };
      if (e.status === "done") {
        // Ne garder que la plus récente (évite les cumuls sur doublons Firebase)
        if (!idx[p].lastDone || (e.finishedAt || 0) > (idx[p].lastDone.finishedAt || 0))
          idx[p].lastDone = e;
      } else if (e.status === "active" || e.status === "paused") {
        if (e.operator === operator) {
          if (!idx[p].mine || (e.startedAt || 0) > (idx[p].mine.startedAt || 0)) idx[p].mine = e;
        } else if (!idx[p].busy.includes(e.operator)) {
          idx[p].busy.push(e.operator);
        }
      }
    });
    // Passe 2 : extraire doneCount depuis lastDone uniquement
    Object.values(idx).forEach(v => {
      v.doneCount = v.lastDone ? (v.lastDone.done || 0) : 0;
    });
    return idx;
  }, [entries, operator]);

  // Totaux du jour
  const totals = useMemo(() => {
    let all = 0, mine = 0;
    Object.values(entries).forEach(e => {
      if (e.status === "done") {
        all += (e.done || 0);
        if (e.operator === operator) mine += (e.done || 0);
      }
    });
    return { all, mine };
  }, [entries, operator]);

  // Produits avec estimation = planifies ; sans estimation = dispo pour MU suppl
  const plannedItems = useMemo(() => items.filter(it => it.estimation != null && it.estimation > 0), [items]);
  const extraPool    = useMemo(() => items.filter(it => !it.estimation || it.estimation <= 0), [items]);

  // allFlItems = tous les produits FL actifs (planifies + extra pool) pour MU non prevues
  // + produits FL inactifs non presentes dans items (pas de type MU) — on les charge separement
  const [showExtra, setShowExtra] = useState(false);
  const [extraAdded, setExtraAdded] = useState({}); // key -> item

  const addExtra = (it) => setExtraAdded(prev => ({ ...prev, [it.produit||it.product]: it }));

  const filtered = useMemo(() => {
    const base = plannedItems.filter(it => {
      const key = it.produit || it.product;
      const info = byProduct[key] || {};
      // Masque si done et doneCount >= estimation (terminé)
      if (info.lastDone && info.doneCount >= (it.estimation || it.target || 0) && (it.estimation || it.target || 0) > 0) return false;
      return true;
    });
    const q = search.trim() ? stripAccents(search.toLowerCase()) : null;
    return q ? base.filter(it => stripAccents((it.produit||it.product||"").toLowerCase()).includes(q)) : base;
  }, [plannedItems, byProduct, search]);

  const filteredExtra = useMemo(() => {
    const pool = extraPool.filter(it => !(it.produit||it.product in extraAdded));
    const q = search.trim() ? stripAccents(search.toLowerCase()) : null;
    return q ? pool.filter(it => stripAccents((it.produit||it.product||"").toLowerCase()).includes(q)) : pool;
  }, [extraPool, extraAdded, search]);

  const renderCard = (it, idx) => {
    const key = it.produit || it.product;
    const info = byProduct[key] || byProduct[it.product] || { doneCount: 0, busy: [], mine: null };
    return (
      <MuCard
        key={`${key}_${idx}`}
        item={it}
        operator={operator}
        dateKey={dateKey}
        myActive={info.mine}
        doneCount={info.doneCount}
        busyBy={info.busy}
      />
    );
  };

  return (
    <div className="app">
      <div className="header" style={{background: "#ef6c00"}}>
        <div className="header-row">
          <div>
            <h1>🥕 Mise en unité</h1>
            <div className="sub">{fmtDateKey(dateKey)}</div>
          </div>
          <div className="header-actions">
            {isAdmin(operator) && (
              <button className="header-btn" onClick={onOpenAdmin}>🔐</button>
            )}
            <button className="header-btn" onClick={onBack}>← Mode</button>
          </div>
        </div>
      </div>
      {/* Bandeau nom en gros */}
      <div style={{background:"#fff8f0",borderBottom:"2px solid #ef6c00",padding:"10px 14px",
        display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
        <div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:1}}>Préparateur actif</div>
          <div style={{fontSize:22,fontWeight:900,color:"#ef6c00",letterSpacing:"-0.5px"}}>{operator}</div>
        </div>
        <button onClick={onBack} style={{padding:"8px 14px",borderRadius:10,border:"2px solid #ef6c00",
          background:"#fff",color:"#ef6c00",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>
          👤 Ce n'est pas moi
        </button>
      </div>

      <div className="mu-topbar">
        <input
          type="text"
          placeholder="🔍 Chercher un fruit / légume…"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
        />
        <button className="mu-refresh" onClick={loadList}>↻</button>
      </div>

      {/* ── Barre de progression globale ── */}
      {!loading && !error && (() => {
        const totalEst  = plannedItems.reduce((s, it) => s + (it.estimation || 0), 0);
        const totalDone = Object.values(entries)
          .filter(e => e.status === "done")
          .reduce((s, e) => s + (e.done || 0), 0);
        const totalIP   = Object.values(entries)
          .filter(e => e.status === "active" || e.status === "paused")
          .reduce((s, e) => s + (e.inProgress || 0), 0);
        const nbDone    = plannedItems.filter(it => {
          const key = it.produit || it.product;
          return Object.values(entries).some(e => e.status === "done" && (e.product === key));
        }).length;
        const pctDone   = totalEst > 0 ? Math.min(100, Math.round((totalDone / totalEst) * 100)) : 0;
        const pctIP     = totalEst > 0 ? Math.min(100 - pctDone, Math.round((totalIP  / totalEst) * 100)) : 0;
        const allFinished = nbDone === plannedItems.length && plannedItems.length > 0;
        return (
          <div style={{margin: "0 14px 4px", background:"#fff", borderRadius:14, padding:"12px 14px",
            boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            {/* Barre combinée : fait (vert) + en cours (orange) */}
            <div style={{background:"#eee", borderRadius:99, height:14, overflow:"hidden", marginBottom:8, position:"relative"}}>
              <div style={{position:"absolute", left:0, top:0, height:"100%", borderRadius:99,
                background:"#2e7d32", width:pctDone+"%", transition:"width 0.5s"}} />
              <div style={{position:"absolute", left:pctDone+"%", top:0, height:"100%",
                background:"#ef6c00", width:pctIP+"%", transition:"width 0.5s", opacity:0.7}} />
            </div>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:6}}>
              <div style={{display:"flex", gap:12, fontSize:13}}>
                <span>🎯 <b>{totalEst}</b> <span style={{color:"#aaa"}}>à faire</span></span>
                <span style={{color:"#2e7d32"}}>✅ <b>{totalDone}</b> faits</span>
                {totalIP > 0 && <span style={{color:"#ef6c00"}}>🏃 <b>{totalIP}</b> en cours</span>}
              </div>
              <div style={{fontSize:12, color: allFinished ? "#2e7d32":"#888", fontWeight: allFinished?700:400}}>
                {allFinished ? "🎉 Tout est fait !" : `${nbDone}/${plannedItems.length} produits terminés`}
              </div>
            </div>
          </div>
        );
      })()}

      {loading && <div style={{textAlign: "center", padding: 40, color: "#999"}}>Chargement de la liste…</div>}

      {!loading && error && (
        <div style={{margin: 14, padding: 14, background: "#fff3e0", border: "1px solid #ffcc80", borderRadius: 10, fontSize: 13, color: "#bf6000"}}>
          {error}
        </div>
      )}

      {!loading && !error && filtered.length === 0 && plannedItems.length === 0 && (
        <div style={{textAlign: "center", padding: 40, color: "#999"}}>Aucun produit planifié pour aujourd'hui.</div>
      )}

      {/* Liste principale : produits AVEC estimation */}
      {!loading && filtered.length > 0 && (
        <div className="mu-grid">
          {filtered.map(renderCard)}
        </div>
      )}

      {/* MU non prévues : produits sans estimation + extra ajoutés */}
      {!loading && (
        <div style={{margin: "12px 14px 0"}}>
          <button
            onClick={() => setShowExtra(s => !s)}
            style={{width:"100%", padding:"12px 16px", borderRadius:10, border:"2px dashed #ef6c00",
              background: showExtra ? "#fff8f0":"#fff", color:"#ef6c00", fontWeight:700, fontSize:14, cursor:"pointer",
              display:"flex", alignItems:"center", justifyContent:"space-between"}}
          >
            <span>➕ MU non prévues {extraPool.length > 0 ? `(${extraPool.length} produits dispo)` : ""}</span>
            <span>{showExtra ? "▲" : "▼"}</span>
          </button>

          {showExtra && (
            <div style={{marginTop:10}}>
              <p style={{fontSize:12, color:"#888", margin:"0 0 8px"}}>
                Ces produits n'ont pas d'estimation aujourd'hui. Ajoute-les si tu dois faire de la MU supplémentaire.
              </p>

              {/* Produits extra déjà ajoutés */}
              {Object.keys(extraAdded).length > 0 && (
                <div className="mu-grid" style={{marginBottom:12}}>
                  {Object.values(extraAdded).map((it, idx) => renderCard(it, 1000+idx))}
                </div>
              )}

              {/* Pool de produits disponibles à ajouter */}
              {filteredExtra.map(it => {
                const key = it.produit || it.product;
                return (
                  <div key={key} style={{display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"8px 12px", marginBottom:6, borderRadius:8, border:"1px solid #eee", background:"#fafafa"}}>
                    <div>
                      <div style={{fontWeight:600, fontSize:13}}>{key}</div>
                      {it.uv && <div style={{fontSize:11, color:"#999"}}>{it.uv}</div>}
                    </div>
                    <button onClick={() => addExtra(it)}
                      style={{padding:"6px 14px", borderRadius:8, border:"none", background:"#ef6c00",
                        color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer"}}>
                      + Ajouter
                    </button>
                  </div>
                );
              })}
              {filteredExtra.length === 0 && Object.keys(extraAdded).length === extraPool.length && (
                <div style={{fontSize:12, color:"#bbb", textAlign:"center", padding:8}}>Tous les produits disponibles ont été ajoutés.</div>
              )}
            </div>
          )}
        </div>
      )}

      <div className="mu-bottom">
        <div>
          <div className="b-num">{totals.mine}</div>
          <div className="b-lbl">tes sachets</div>
        </div>
        <div>
          <div className="b-num">{totals.all}</div>
          <div className="b-lbl">total aujourd'hui</div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   ONGLET MU DANS LE MASTER (admin) — historique & recap par nom
   ========================================================================= */

function MuAdminTab() {
  const [allDays, setAllDays]   = useState({});
  const [loading, setLoading]   = useState(true);
  const [selectedDay, setSelectedDay] = useState("");
  const [sending, setSending]   = useState(false);
  const [mailSent, setMailSent] = useState({});

  useEffect(() => {
    if (!firebaseReady) { setLoading(false); return; }
    const ref = db.ref("mu");
    const handler = (snap) => { setAllDays(snap.val() || {}); setLoading(false); };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  const dayKeys = useMemo(() => Object.keys(allDays).sort((a,b) => a<b?1:-1), [allDays]);
  useEffect(() => { if (!selectedDay && dayKeys.length > 0) setSelectedDay(dayKeys[0]); }, [dayKeys, selectedDay]);

  const allEntries = useMemo(() => {
    const d = allDays[selectedDay];
    if (!d || !d.entries) return [];
    return Object.entries(d.entries)
      .filter(([,e]) => e)
      .map(([id, e]) => ({ id, ...e }))
      .sort((a,b) => (a.startedAt||0) - (b.startedAt||0));
  }, [allDays, selectedDay]);

  const doneEntries = useMemo(() => allEntries.filter(e => e.status === "done"), [allEntries]);

  const byOperator = useMemo(() => {
    const m = {};
    doneEntries.forEach(e => {
      if (!m[e.operator]) m[e.operator] = { sachets:0, durationMs:0, produits:[] };
      m[e.operator].sachets    += e.done || 0;
      m[e.operator].durationMs += e.durationMs || 0;
      m[e.operator].produits.push(e.product);
    });
    return Object.entries(m).map(([name,v]) => ({
      name, ...v,
      cadence: v.durationMs > 0 ? (v.sachets / (v.durationMs / 3600000)).toFixed(0) : "—",
    })).sort((a,b) => b.sachets - a.sachets);
  }, [doneEntries]);

  const byProduct = useMemo(() => {
    const m = {};
    doneEntries.forEach(e => {
      if (!m[e.product]) m[e.product] = { target: e.target||0, done:0, operators:[] };
      m[e.product].done += e.done || 0;
      if (!m[e.product].operators.includes(e.operator)) m[e.product].operators.push(e.operator);
      if ((e.target||0) > m[e.product].target) m[e.product].target = e.target||0;
    });
    return Object.entries(m).map(([product,v]) => ({ product, ...v })).sort((a,b) => b.done - a.done);
  }, [doneEntries]);

  const dayTotal = useMemo(() => doneEntries.reduce((s,e) => s + (e.done||0), 0), [doneEntries]);
  const dayDurationMs = useMemo(() => doneEntries.reduce((s,e) => s + (e.durationMs||0), 0), [doneEntries]);

  const sendMailRecap = async () => {
    if (!selectedDay) return;
    setSending(true);
    try {
      const payload = {
        secret: typeof FRESHDESK_SECRET !== "undefined" ? FRESHDESK_SECRET : "Lesmailspartent!",
        action: "mail_mu_recap",
        day: selectedDay,
        total: dayTotal,
        durationMs: dayDurationMs,
        byOperator,
        byProduct,
        entries: doneEntries,
      };
      const res = await fetch(FL_PROXY_URL, { method:"POST", body: JSON.stringify(payload) });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "erreur proxy");
      setMailSent(prev => ({ ...prev, [selectedDay]: true }));
      alert("✉️ Récap envoyé à hg@probon.fr");
    } catch(e) {
      alert("Erreur envoi mail : " + e.message);
    } finally {
      setSending(false);
    }
  };

  if (loading) return <div style={{textAlign:"center",padding:40,color:"#999"}}>Chargement…</div>;
  if (dayKeys.length === 0) return <div style={{textAlign:"center",padding:40,color:"#999"}}>Aucune mise en unité enregistrée.</div>;

  return (
    <div>
      {/* Sélecteur jour */}
      <div style={{marginBottom:12,overflowX:"auto",display:"flex",gap:6,paddingBottom:4}}>
        {dayKeys.map(k => (
          <button key={k} onClick={() => setSelectedDay(k)} style={{
            flex:"0 0 auto",padding:"8px 12px",borderRadius:8,fontSize:13,fontWeight:700,
            background: selectedDay===k ? "#ef6c00":"#f0f0f0", color: selectedDay===k?"#fff":"#555",border:"none",cursor:"pointer"
          }}>{fmtDateKey(k)}</button>
        ))}
      </div>

      {/* KPIs */}
      <div className="recap-card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <h3 style={{margin:0}}>🥕 {fmtDateKey(selectedDay)}</h3>
          <button onClick={sendMailRecap} disabled={sending} style={{
            padding:"7px 14px",borderRadius:8,border:"none",background: mailSent[selectedDay]?"#2e7d32":"#ef6c00",
            color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"
          }}>{sending ? "Envoi…" : mailSent[selectedDay] ? "✓ Envoyé" : "✉️ Envoyer récap"}</button>
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {[
            ["Sachets faits", dayTotal],
            ["Préparateurs", byOperator.length],
            ["Produits traités", byProduct.length],
            ["Durée totale", fmtDuration(dayDurationMs)],
          ].map(([lbl,val]) => (
            <div key={lbl} style={{flex:"1 1 100px",background:"#fff8f0",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:800,color:"#ef6c00"}}>{val}</div>
              <div style={{fontSize:11,color:"#888"}}>{lbl}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Par préparateur */}
      <div className="recap-card">
        <h3>👤 Par préparateur</h3>
        {byOperator.length === 0 && <div style={{color:"#999",fontSize:13}}>Aucune donnée.</div>}
        {byOperator.map(o => (
          <div key={o.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f0f0f0"}}>
            <div>
              <div style={{fontWeight:700}}>{o.name}</div>
              <div style={{fontSize:11,color:"#999"}}>{fmtDuration(o.durationMs)} · {o.cadence} sachets/h · {o.produits.length} produit{o.produits.length>1?"s":""}</div>
            </div>
            <div style={{fontSize:22,fontWeight:800,color:"#ef6c00"}}>{o.sachets}</div>
          </div>
        ))}
      </div>

      {/* Par produit */}
      <div className="recap-card">
        <h3>📦 Par produit</h3>
        {byProduct.map(p => {
          const pct = p.target > 0 ? Math.min(100, Math.round((p.done/p.target)*100)) : 100;
          return (
            <div key={p.product} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                <span style={{fontWeight:600}}>{p.product}</span>
                <span style={{color: p.done >= p.target ? "#2e7d32":"#ef6c00",fontWeight:700}}>
                  {p.done} <span style={{color:"#bbb",fontWeight:400}}>/ {p.target} est.</span>
                </span>
              </div>
              <div style={{background:"#eee",borderRadius:99,height:6,marginTop:3}}>
                <div style={{height:"100%",borderRadius:99,background:p.done>=p.target?"#2e7d32":"#ef6c00",width:pct+"%"}} />
              </div>
              <div style={{fontSize:10,color:"#aaa",marginTop:2}}>{p.operators.join(", ")}</div>
            </div>
          );
        })}
      </div>

      {/* Historique détaillé */}
      <div className="recap-card">
        <h3>🕓 Historique détaillé</h3>
        {doneEntries.map((e,i) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid #f5f5f5"}}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{e.product}</div>
              <div style={{fontSize:11,color:"#999"}}>
                {e.operator} · {fmtTime(e.startedAt)} → {fmtTime(e.finishedAt)} · {fmtDuration(e.durationMs||0)}
                {e.inProgress != null && e.inProgress !== e.done ? <span> · en cours renseigné : {e.inProgress}</span> : ""}
              </div>
            </div>
            <div style={{fontWeight:800,fontSize:18,color:"#ef6c00",marginLeft:8}}>{e.done}</div>
          </div>
        ))}
      </div>
    </div>
  );
}


/* =========================================================================
   APP ROOT
   ========================================================================= */

function App() {
  const [operator, setOperator] = useState(localStorage.getItem("dispatch_operator") || "");
  const [sessionId, setSessionId] = useState(localStorage.getItem("dispatch_sessionId") || "");
  const [supplier, setSupplier] = useState(localStorage.getItem("dispatch_supplier") || "");
  const [products, setProducts] = useState(() => {
    try { return JSON.parse(localStorage.getItem("dispatch_products") || "[]"); }
    catch { return []; }
  });
  const [storeColumns, setStoreColumns] = useState(() => {
    try { return JSON.parse(localStorage.getItem("dispatch_storeColumns") || "[]"); }
    catch { return []; }
  });
  const [view, setView] = useState("dispatch"); // dispatch | recap | admin | adminSession | naming
  const [mode, setMode] = useState(localStorage.getItem("dispatch_mode") || ""); // "" | "palette" | "mu"
  const [recapData, setRecapData] = useState(null);
  const [adminViewingSession, setAdminViewingSession] = useState(null);
  const [namingData, setNamingData] = useState(null); // { supplier, products, storeColumns }

  // Persistance locale du contexte
  useEffect(() => {
    if (sessionId) localStorage.setItem("dispatch_sessionId", sessionId);
    if (supplier) localStorage.setItem("dispatch_supplier", supplier);
    if (products.length > 0) localStorage.setItem("dispatch_products", JSON.stringify(products));
    if (storeColumns.length > 0) localStorage.setItem("dispatch_storeColumns", JSON.stringify(storeColumns));
  }, [sessionId, supplier, products, storeColumns]);

  const handleChooseMode = (m) => {
    localStorage.setItem("dispatch_mode", m);
    setMode(m);
    setView("dispatch");
  };

  const handleBackToMode = () => {
    localStorage.removeItem("dispatch_mode");
    setMode("");
    setView("dispatch");
  };

  const handleSessionStart = (sid, sup, prods, storeCols) => {
    setSessionId(sid);
    setSupplier(sup);
    setProducts(prods);
    setStoreColumns(storeCols || []);
    setView("dispatch");

    if (firebaseReady) {
      db.ref(`dispatch/${sid}/meta`).set({
        supplier: sup,
        startedAt: Date.now(),
        products: prods,
        storeColumns: storeCols || [],
        createdBy: operator
      });
    }

    // Notification Telegram de démarrage (non bloquant)
    try {
      fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: "log-dispatch-start",
          sessionId: sid,
          supplier: sup,
          operator: operator,
          total: prods.length,
          startedAt: new Date().toISOString()
        })
      }).catch(e => console.warn("Telegram start failed:", e));
    } catch (e) {
      console.warn("Telegram start error:", e);
    }
  };

  const handleJoinSession = (sid) => {
    if (!firebaseReady) return;
    db.ref(`dispatch/${sid}/meta`).once("value").then(snap => {
      const m = snap.val();
      if (m) {
        setSessionId(sid);
        setSupplier(m.supplier || "Fournisseur");
        setProducts(m.products || []);
        setStoreColumns(m.storeColumns || []);
        setView("dispatch");
      }
    });
  };

  const handleNeedsNaming = (data) => {
    setNamingData(data);
    setView("naming");
  };

  const handleNamingConfirm = (finalProducts, finalCols) => {
    if (!namingData) return;
    const sup = namingData.supplier;
    const sessionId = `${stripAccents(sup).replace(/[^a-zA-Z0-9]/g, "_").toLowerCase()}_${Date.now()}`;
    setNamingData(null);
    handleSessionStart(sessionId, sup, finalProducts, finalCols);
  };

  const handleNamingCancel = () => {
    setNamingData(null);
    setView("dispatch");
  };

  const handleFinish = (state, productsWithKeys) => {
    setRecapData({ state, products: productsWithKeys });
    setView("recap");
  };

  const handleLeaveSession = () => {
    localStorage.removeItem("dispatch_sessionId");
    localStorage.removeItem("dispatch_supplier");
    localStorage.removeItem("dispatch_products");
    localStorage.removeItem("dispatch_storeColumns");
    setSessionId("");
    setSupplier("");
    setProducts([]);
    setStoreColumns([]);
    setRecapData(null);
    setView("dispatch");
  };

  const handleResetCache = () => {
    if (!confirm("Vider le cache de l'app ?\n\nCela supprime la session en cours sur CET appareil et toutes les données de produits en mémoire. À faire si les quantités affichées sont fausses. Tu devras recharger le fichier.")) return;
    // Purge toutes les clés liées au dispatch (sauf prénom et mode)
    Object.keys(localStorage)
      .filter(k => k.startsWith("dispatch_") && k !== "dispatch_operator" && k !== "dispatch_mode")
      .forEach(k => localStorage.removeItem(k));
    setSessionId("");
    setSupplier("");
    setProducts([]);
    setStoreColumns([]);
    setRecapData(null);
    setView("dispatch");
    setTimeout(() => window.location.reload(), 100);
  };

  const handleLogout = () => {
    if (!confirm("Te déconnecter ? Tu pourras te reconnecter avec un autre prénom.")) return;
    localStorage.removeItem("dispatch_operator");
    localStorage.removeItem("dispatch_sessionId");
    localStorage.removeItem("dispatch_supplier");
    localStorage.removeItem("dispatch_products");
    localStorage.removeItem("dispatch_storeColumns");
    localStorage.removeItem("dispatch_mode");
    setOperator("");
    setSessionId("");
    setSupplier("");
    setProducts([]);
    setStoreColumns([]);
    setRecapData(null);
    setMode("");
    setView("dispatch");
  };

  if (!operator) {
    return <LoginScreen onLogin={setOperator} />;
  }

  // Écran de nommage des magasins inconnus
  if (view === "naming" && namingData) {
    return (
      <NamingScreen
        supplier={namingData.supplier}
        products={namingData.products}
        storeColumns={namingData.storeColumns}
        onConfirm={handleNamingConfirm}
        onCancel={handleNamingCancel}
      />
    );
  }

  if (view === "adminSession" && adminViewingSession) {
    return (
      <AdminSessionDetail
        session={adminViewingSession}
        onClose={() => { setAdminViewingSession(null); setView("admin"); }}
      />
    );
  }

  if (view === "admin") {
    if (!isAdmin(operator)) {
      return (
        <div className="screen-center">
          <div className="card">
            <h3>Accès refusé</h3>
            <p style={{color: "#666", fontSize: 13}}>Tu n'as pas les droits administrateur.</p>
            <button className="btn-primary" onClick={() => setView("dispatch")}>Retour</button>
          </div>
        </div>
      );
    }
    return (
      <AdminScreen
        operator={operator}
        onClose={() => setView("dispatch")}
        onViewSession={(s) => { setAdminViewingSession(s); setView("adminSession"); }}
      />
    );
  }

  // Choix du mode après connexion
  if (!mode) {
    return (
      <ModeChoiceScreen
        operator={operator}
        onChoose={handleChooseMode}
        onOpenAdmin={() => setView("admin")}
        onLogout={handleLogout}
      />
    );
  }

  // Mode Mise en unité
  if (mode === "mu") {
    return (
      <MUScreen
        operator={operator}
        onBack={handleBackToMode}
        onOpenAdmin={() => setView("admin")}
        onLogout={handleLogout}
      />
    );
  }

  // ----- Mode Palette (dispatch classique) -----
  if (!sessionId || products.length === 0) {
    return (
      <UploadScreen
        operator={operator}
        onSessionStart={handleSessionStart}
        onJoinSession={handleJoinSession}
        onOpenAdmin={() => setView("admin")}
        onLogout={handleLogout}
        onNeedsNaming={handleNeedsNaming}
        onBackToMode={handleBackToMode}
        onReset={handleResetCache}
      />
    );
  }

  if (view === "recap" && recapData) {
    return (
      <RecapScreen
        sessionId={sessionId}
        operator={operator}
        supplier={supplier}
        products={recapData.products}
        storeColumns={storeColumns}
        state={recapData.state}
        onClose={() => setView("dispatch")}
        onLeave={handleLeaveSession}
      />
    );
  }

  return (
    <DispatchScreen
      sessionId={sessionId}
      operator={operator}
      supplier={supplier}
      products={products}
      storeColumns={storeColumns}
      onFinish={handleFinish}
      onLeave={handleLeaveSession}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
