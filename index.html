<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Kelbongoo - Dispatch palette et MU</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<!-- Firebase (compat builds, comme l'app prep) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
    overscroll-behavior: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; }
  input { font-family: inherit; }

  .app { max-width: 900px; margin: 0 auto; min-height: 100vh; background: #fff; }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: #1a4d2e;
    color: #fff;
    padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .header h1 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: .3px; }
  .header .sub { font-size: 12px; opacity: .85; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    background: rgba(255,255,255,.15);
    color: #fff; padding: 6px 12px; border-radius: 6px;
    font-size: 13px; font-weight: 600;
  }
  .header-btn:active { background: rgba(255,255,255,.3); }

  /* Login / Upload screens */
  .screen-center {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  .logo {
    font-size: 28px; font-weight: 800; color: #1a4d2e;
    margin-bottom: 8px; letter-spacing: -.5px;
  }
  .tag { color: #666; font-size: 14px; margin-bottom: 32px; }
  .card {
    width: 100%; max-width: 360px;
    background: #fff; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.08);
    padding: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
  .field input, .field select {
    width: 100%; padding: 12px; font-size: 16px;
    border: 1.5px solid #ddd; border-radius: 8px; background: #fff;
  }
  .field input:focus, .field select:focus { outline: none; border-color: #1a4d2e; }
  .btn-primary {
    width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
    background: #1a4d2e; color: #fff; border-radius: 8px;
    transition: background .15s;
  }
  .btn-primary:active { background: #0d3d20; }
  .btn-primary:disabled { background: #aaa; }
  .btn-secondary {
    width: 100%; padding: 12px; font-size: 14px; font-weight: 600;
    background: #f0f0f0; color: #333; border-radius: 8px;
    margin-top: 8px;
  }

  /* Upload */
  .upload-zone {
    border: 2px dashed #1a4d2e; border-radius: 12px;
    padding: 32px 16px; text-align: center;
    background: #f4f9f5; cursor: pointer;
  }
  .upload-zone:active { background: #e6f1ea; }
  .upload-zone .icon { font-size: 40px; margin-bottom: 8px; }
  .upload-zone .label { font-weight: 600; color: #1a4d2e; }
  .upload-zone .hint { font-size: 12px; color: #666; margin-top: 4px; }

  /* Progress bar */
  .progress-bar {
    background: #e6e8ec; height: 6px; border-radius: 3px; overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%; background: #4caf50;
    transition: width .3s ease;
  }
  .progress-text {
    display: flex; justify-content: space-between;
    font-size: 12px; color: #666; margin-top: 4px;
  }

  /* Product list */
  .product-list { padding: 8px; padding-bottom: 100px; }
  .product-card {
    background: #fff; border: 1.5px solid #e6e8ec;
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
    transition: all .2s;
  }
  .product-card.locked {
    background: #fff8e1; border-color: #ffb300;
  }
  .product-card.mine {
    background: #e8f5e9; border-color: #1a4d2e;
    box-shadow: 0 0 0 2px rgba(26, 77, 46, 0.15);
  }
  .product-card.done {
    background: #e8f5e9; border-color: #4caf50; opacity: .7;
  }
  .product-card.done .designation { text-decoration: line-through; color: #555; }

  .designation {
    font-size: 14px; font-weight: 600;
    line-height: 1.3; margin-bottom: 6px;
  }
  .product-meta {
    font-size: 11px; color: #777; margin-bottom: 8px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .product-meta .article { font-family: monospace; }
  .product-meta .recu { color: #1a4d2e; font-weight: 600; }

  .dest-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 6px; margin-bottom: 8px;
  }
  .dest-cell {
    background: #f4f5f7; border-radius: 6px;
    padding: 8px 4px; text-align: center;
  }
  .dest-cell .name { font-size: 10px; font-weight: 700; color: #666; letter-spacing: .5px; }
  .dest-cell .qty { font-size: 20px; font-weight: 800; color: #1a4d2e; margin-top: 2px; }
  .dest-cell .qty.zero { color: #ccc; }

  .actions-row { display: flex; gap: 6px; }
  .btn-validate {
    flex: 1; padding: 12px; font-size: 14px; font-weight: 700;
    background: #1a4d2e; color: #fff; border-radius: 8px;
  }
  .btn-validate:active { background: #0d3d20; }
  .btn-edit {
    padding: 12px 14px; font-size: 14px;
    background: #f0f0f0; color: #555; border-radius: 8px;
  }
  .btn-undo {
    flex: 1; padding: 10px; font-size: 13px; font-weight: 600;
    background: #fff; color: #4caf50; border: 1.5px solid #4caf50; border-radius: 8px;
  }

  .lock-badge {
    background: #ffb300; color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 10px;
    display: inline-block; margin-bottom: 6px;
  }
  .done-badge {
    background: #4caf50; color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 10px;
    display: inline-block; margin-bottom: 6px;
  }
  .timestamp {
    font-size: 10px; color: #888; font-weight: 500;
  }

  /* Search bar */
  .search-bar {
    position: sticky; top: 64px; z-index: 5;
    background: #fff; padding: 8px 12px;
    border-bottom: 1px solid #e6e8ec;
  }
  .search-bar input {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1.5px solid #ddd; border-radius: 8px;
  }
  .search-bar input:focus { outline: none; border-color: #1a4d2e; }

  /* Tabs */
  .tabs-bar {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e6e8ec;
    position: sticky; top: 64px; z-index: 6;
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    background: transparent;
    color: #777;
    font-size: 13px;
    font-weight: 600;
    border-bottom: 3px solid transparent;
    transition: all .15s;
  }
  .tab.active {
    color: #1a4d2e;
    border-bottom-color: #1a4d2e;
    background: #f4f9f5;
  }
  .tab:active { background: #e6f1ea; }

  /* Mode scan */
  .scan-mode {
    padding: 16px;
    padding-bottom: 100px;
    min-height: calc(100vh - 200px);
  }
  .scan-search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .scan-search-input {
    width: 100%;
    padding: 20px 50px 20px 20px;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    border: 3px solid #1a4d2e;
    border-radius: 16px;
    background: #fff;
    text-transform: lowercase;
    letter-spacing: 2px;
  }
  .scan-search-input:focus {
    outline: none;
    box-shadow: 0 0 0 4px rgba(26, 77, 46, 0.15);
  }
  .scan-search-input::placeholder {
    color: #ccc;
    font-weight: 500;
    letter-spacing: normal;
    font-size: 18px;
  }
  .scan-clear {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    width: 36px; height: 36px;
    background: #f0f0f0;
    border-radius: 50%;
    font-size: 16px;
    color: #555;
  }
  .scan-hint {
    text-align: center;
    padding: 40px 20px;
    color: #555;
  }
  .scan-results {
    /* Cartes plus grandes en mode scan */
  }
  .scan-results .product-card {
    padding: 16px;
    margin-bottom: 12px;
  }
  .scan-results .designation {
    font-size: 16px;
  }
  .scan-results .dest-cell .qty {
    font-size: 24px;
  }
  .scan-results .btn-validate {
    padding: 16px;
    font-size: 16px;
  }

  /* Bottom action bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid #e6e8ec;
    padding: 12px 16px; box-shadow: 0 -2px 8px rgba(0,0,0,.06);
    z-index: 10;
  }
  .bottom-bar .stats {
    display: flex; justify-content: space-between;
    font-size: 12px; color: #666; margin-bottom: 8px;
  }
  .btn-finish {
    width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
    background: #4caf50; color: #fff; border-radius: 8px;
  }
  .btn-finish:disabled { background: #aaa; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
  }
  .modal {
    background: #fff; border-radius: 12px; padding: 20px;
    width: 100%; max-width: 360px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 12px 0; font-size: 16px; }
  .modal .designation-modal { font-size: 13px; color: #555; margin-bottom: 16px; }
  .edit-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 16px;
  }
  .edit-cell label { font-size: 11px; font-weight: 700; color: #666; }
  .edit-cell input {
    width: 100%; padding: 10px; font-size: 18px; font-weight: 700;
    text-align: center; border: 1.5px solid #ddd; border-radius: 6px;
    margin-top: 4px;
  }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 14px; }
  .btn-cancel { background: #f0f0f0; color: #555; }
  .btn-confirm { background: #1a4d2e; color: #fff; }

  /* Recap */
  .recap-section { padding: 16px; padding-bottom: 100px; }
  .recap-card {
    background: #fff; border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
  }
  .recap-card h3 { margin: 0 0 12px 0; font-size: 15px; }
  .recap-stat {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
  }
  .recap-stat:last-child { border-bottom: none; }
  .recap-stat .label { color: #666; }
  .recap-stat .value { font-weight: 700; color: #1a4d2e; }

  .anomaly-item {
    padding: 10px; border-radius: 6px;
    background: #fff3e0; border-left: 3px solid #ff9800;
    font-size: 12px; margin-bottom: 6px;
  }
  .anomaly-item .product { font-weight: 600; }
  .anomaly-item .detail { color: #666; margin-top: 2px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 16px;
    border-radius: 8px; font-size: 13px; z-index: 200;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }

  /* Connection status */
  .conn-status {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(255,255,255,.2);
  }
  .conn-status.offline { background: #d32f2f; }

  /* ===== Choix du mode (Palette / MU) ===== */
  .mode-grid { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
  .mode-btn {
    width: 100%; padding: 26px 18px; border-radius: 16px;
    background: #fff; border: 2px solid #e6e8ec; text-align: left;
    box-shadow: 0 4px 16px rgba(0,0,0,.06); transition: all .15s;
  }
  .mode-btn:active { transform: scale(.98); }
  .mode-btn .ico { font-size: 38px; }
  .mode-btn .ttl { font-size: 20px; font-weight: 800; color: #1a4d2e; margin-top: 6px; }
  .mode-btn .desc { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.35; }
  .mode-btn.mu { border-color: #ef6c00; }
  .mode-btn.mu .ttl { color: #ef6c00; }

  /* ===== Mode MU (mise en unité) ===== */
  .mu-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px; padding: 14px; padding-bottom: 120px;
  }
  .mu-card {
    background: #fff; border: 2px solid #e6e8ec; border-radius: 16px;
    padding: 18px; display: flex; flex-direction: column;
    box-shadow: 0 2px 8px rgba(0,0,0,.05); transition: all .15s;
  }
  .mu-card.active { border-color: #ef6c00; background: #fff8f1; box-shadow: 0 0 0 3px rgba(239,108,0,.15); }
  .mu-card .mu-name {
    font-size: 24px; font-weight: 800; line-height: 1.15; color: #1a1a1a;
    margin-bottom: 12px;
  }
  .mu-fourchette {
    font-size: 16px; color: #1a4d2e; background: #eaf3ec;
    border-radius: 10px; padding: 8px 12px; margin-bottom: 12px;
    line-height: 1.3;
  }
  .mu-fourchette b { font-size: 18px; }
  .mu-target {
    display: inline-flex; align-items: baseline; gap: 8px;
    background: #1a4d2e; color: #fff; border-radius: 12px;
    padding: 10px 16px; align-self: flex-start; margin-bottom: 12px;
  }
  .mu-target .lbl { font-size: 13px; font-weight: 600; opacity: .85; }
  .mu-target .num { font-size: 34px; font-weight: 900; line-height: 1; }
  .mu-sub { font-size: 13px; color: #555; margin-bottom: 6px; display:flex; gap:10px; flex-wrap:wrap; }
  .mu-sub .done { color: #2e7d32; font-weight: 700; }
  .mu-busy {
    font-size: 12px; font-weight: 700; color: #ef6c00;
    background: #fff3e0; border-radius: 8px; padding: 4px 8px;
    display: inline-block; margin-bottom: 10px;
  }
  .mu-start {
    margin-top: auto; width: 100%; padding: 18px; font-size: 19px; font-weight: 800;
    background: #1a4d2e; color: #fff; border-radius: 12px;
  }
  .mu-start:active { background: #0d3d20; }
  .mu-running {
    margin-top: auto; background: #fff3e0; border-radius: 12px; padding: 12px;
    text-align: center;
  }
  .mu-running .clock {
    font-size: 40px; font-weight: 900; color: #ef6c00; font-variant-numeric: tabular-nums;
    letter-spacing: 1px; line-height: 1;
  }
  .mu-running .since { font-size: 11px; color: #999; margin-top: 2px; }
  .mu-running .btns { display: flex; gap: 8px; margin-top: 12px; }
  .mu-done-btn {
    flex: 1; padding: 16px; font-size: 17px; font-weight: 800;
    background: #ef6c00; color: #fff; border-radius: 10px;
  }
  .mu-done-btn:active { background: #d35f00; }
  .mu-cancel-btn {
    padding: 16px; font-size: 15px; font-weight: 700;
    background: #fff; color: #999; border: 1.5px solid #ddd; border-radius: 10px;
  }
  /* Stepper de saisie du nb de sachets faits */
  .mu-stepper { margin-top: auto; background: #fff8f1; border-radius: 12px; padding: 14px; }
  .mu-stepper .q { text-align: center; font-size: 14px; font-weight: 700; color: #555; margin-bottom: 10px; }
  .mu-stepper .row { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .mu-step-pm {
    width: 58px; height: 58px; border-radius: 50%; font-size: 30px; font-weight: 900;
    background: #fff; border: 2px solid #ef6c00; color: #ef6c00;
  }
  .mu-step-pm:active { background: #ffe0c2; }
  .mu-step-val {
    width: 86px; text-align: center; font-size: 44px; font-weight: 900;
    border: none; background: transparent; color: #1a1a1a;
  }
  .mu-step-val:focus { outline: none; }
  .mu-validate {
    width: 100%; margin-top: 14px; padding: 16px; font-size: 17px; font-weight: 800;
    background: #2e7d32; color: #fff; border-radius: 10px;
  }
  .mu-validate:active { background: #1b5e20; }
  .mu-topbar {
    position: sticky; top: 64px; z-index: 5; background: #fff;
    padding: 10px 12px; border-bottom: 1px solid #e6e8ec;
    display: flex; gap: 8px; align-items: center;
  }
  .mu-topbar input {
    flex: 1; padding: 11px 12px; font-size: 15px;
    border: 1.5px solid #ddd; border-radius: 8px;
  }
  .mu-topbar input:focus { outline: none; border-color: #ef6c00; }
  .mu-refresh {
    padding: 11px 14px; font-size: 15px; background: #f0f0f0; color: #555; border-radius: 8px; font-weight: 700;
  }
  .mu-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: #1a4d2e; color: #fff; padding: 12px 16px;
    display: flex; justify-content: space-around; text-align: center;
    box-shadow: 0 -2px 8px rgba(0,0,0,.1);
  }
  .mu-bottom .b-num { font-size: 24px; font-weight: 900; }
  .mu-bottom .b-lbl { font-size: 11px; opacity: .85; }
</style>
</head>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* =========================================================================
   CONFIGURATION
   ========================================================================= */

// Firebase config - projet kelbongoo-prep (app Dispatch)
const FIREBASE_CONFIG = {

  messagingSenderId: "596701505006",

};

// URL Apps Script pour envoi du récap (Kelbongoo Distribution Proxy)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj8BOPRY7V_Ni_0a-6YmNA-1HyRAcf0QXAL1FMy04Xnp1W4Am-cNuR4poQOHzu4VCL4Q/exec";
const FL_PROXY_URL = "https://script.google.com/macros/s/AKfycbyVvvafumNfLZ7RzseUvoHaghPK7c-_7KqthgtV_VY9ulXe7sJIYEclWnratDbBJeDd/exec"; // proxy FL/Probon

// === MU (Mise en unité) ===
// Feuille FL lue côté serveur via le proxy Apps Script (action=get-mu-list).
// La feuille n'est pas publique : impossible de la lire directement depuis le navigateur,
// d'où le passage par Apps Script (voir mu_apps_script.gs à ajouter au proxy).
const MU_SHEET_ID = "1PXQU4QP_bh_sRCEHonrMM7FkWmJWtNPyxDBPPRBlNVQ"; // sheet COMMANDE FL KBG x PROBON
const MU_SHEET_GID = 1075113568;

// Durée de verrouillage d'une ligne (ms) - 30s sans renouvellement = auto-déverrouillage
const LOCK_DURATION_MS = 30000;
const LOCK_REFRESH_MS = 10000;

// Liste des opérateurs ayant accès au mode Admin (case-insensitive)
const ADMIN_NAMES = ["henry", "raimbaud"];
const isAdmin = (name) => ADMIN_NAMES.includes((name||"").toLowerCase().trim());

// Init Firebase
let db = null;
let firebaseReady = false;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  firebaseReady = true;
} catch(e) { console.error("Firebase init failed", e); }

/* =========================================================================
   HELPERS
   ========================================================================= */

const fmtTime = (ts) => {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
};

const fmtDuration = (ms) => {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h${(m%60).toString().padStart(2,"0")}`;
  if (m > 0) return `${m}min ${s%60}s`;
  return `${s}s`;
};

// Chrono live mm:ss (ou h:mm:ss)
const fmtClock = (ms) => {
  const total = Math.max(0, Math.floor(ms / 1000));
  const s = total % 60;
  const m = Math.floor(total / 60) % 60;
  const h = Math.floor(total / 3600);
  const pad = (n) => n.toString().padStart(2, "0");
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}`;
};

// Clé de date du jour (YYYY-MM-DD, heure locale) pour regrouper les MU
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,"0")}-${d.getDate().toString().padStart(2,"0")}`;
};
const fmtDateKey = (k) => {
  if (!k) return "";
  const [y,m,d] = k.split("-");
  return new Date(+y, +m-1, +d).toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long" });
};

const stripAccents = (s) => (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");

// Identifiant stable pour une ligne (basé sur le code article + index pour les cas sans code)
const productKey = (p, idx) => {
  const code = (p.article || "").toString().trim();
  if (code) return `a_${code}`;
  return `l_${idx}`;
};

/* =========================================================================
   EXCEL PARSING
   ========================================================================= */

// Normalise un nom de colonne pour le matching (sans accents, lowercase, trim)
const normCol = (s) => stripAccents((s||"").toString()).toLowerCase().trim();

// Mapping codes G5 (Magasin XX) → sigle
const G5_STORE_MAP = {
  "01": "rob", "03": "tol", "98": "pdp",
  "05": "bic", "02": "bar", "04": "bor",
  "06": "ces", "07": "cha", "09": "for",
  "10": "lil", "11": "nca", "12": "ncc",
  "13": "pad", "14": "pdc", "17": "rom",
  "18": "stb"
};

// Colonnes "système" à ne jamais interpréter comme un magasin.
// On utilise une LISTE NOIRE (mots-clés connus) plutôt qu'une liste blanche de sites :
// ainsi tout nouveau site est reconnu automatiquement sans modifier le code.
const NON_STORE_KEYWORDS = new Set([
  // identifiants produit
  "article", "code article", "code", "ref", "reference", "ean", "barcode", "sku",
  // désignations
  "designation", "libelle", "nom", "produit", "description",
  // quantités système
  "quantite", "qte", "qty", "uvc", "uc", "cde", "cde en uvc", "commande en uvc",
  "commande", "cmd",
  // réceptions
  "recue", "receptionnee", "recu", "reception",
  "quantite receptionnee", "quantites receptionnees",
  "quantite cmd frs", "quantite cmd",
  // prix / poids
  "prix", "tarif", "poids", "poids kg", "kg", "tva",
  // colonne vide
  ""
]);

// Parse une cellule G5 qui peut être au format "07-1-59 ||| 36.000000"
// Retourne le nombre après les ||| ou simplement la valeur si pas de ||| .
const parseG5Cell = (v) => {
  if (v === "" || v === null || v === undefined) return 0;
  const s = v.toString().trim();
  // Format G5 : "XX-Y-ZZZ ||| nombre.000000"
  // On peut avoir plusieurs ||| (ex: "98 ||| 98-1-0000000008 ||| 36.000000")
  // → on prend toujours ce qui est après le DERNIER |||
  const lastSep = s.lastIndexOf("|||");
  let numStr = lastSep >= 0 ? s.substring(lastSep + 3).trim() : s;
  // Format "12u = 2.798000" (autre ancien format) → 12
  const um = numStr.match(/^(\d+)\s*u/);
  if (um) return parseInt(um[1], 10);
  const n = parseFloat(numStr);
  return isNaN(n) ? 0 : Math.round(n); // arrondit (36.000000 -> 36)
};

// Détecte la structure du fichier - magasins dynamiques
// Retourne :
//   - products : tableau de produits avec champ `stores` dynamique (map)
//   - storeColumns : tableau de définitions de colonnes magasin
//       { code: "ROB" ou "MAGASIN_04" (uniq), label: "ROB" ou "Magasin 04",
//         needsNaming: bool (true si non reconnu, demande à l'utilisateur) }
function parseExcelFile(workbook) {
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

  // Helper : détecte si une cellule est un magasin et retourne sa définition
  // - "ROB", "TOL", "PDP" exacts → reconnu
  // - "Magasin 01/03/98" → reconnu via mapping G5_STORE_MAP
  // - "Magasin XX" non mappé → inconnu (needsNaming)
  // - "Commande ROB" / "ROB Commande" → reconnu
  // - Autre nom → null
  // Détecte si un en-tête est un magasin.
  // Aucune liste blanche de codes : tout sigle court non-système est accepté.
  // → un nouveau site (ex: "XYZ") sera reconnu sans toucher au code.
  const isSigle = (s) => /^[a-z0-9]{2,6}$/.test(s) && !NON_STORE_KEYWORDS.has(s);

  const detectStoreColumn = (cellRaw, cellNorm) => {
    if (!cellNorm) return null;
    if (NON_STORE_KEYWORDS.has(cellNorm)) return null;

    // Format G5 : "Magasin XX"
    if (cellNorm.startsWith("magasin")) {
      const code = cellNorm.replace(/^magasin\s*/, "").trim();
      const mapped = G5_STORE_MAP[code];
      if (mapped) {
        const uc = mapped.toUpperCase();
        return { code: uc, label: uc, needsNaming: false };
      }
      return { code: `MAGASIN_${code}`, label: `Magasin ${code}`, needsNaming: true, originalHeader: cellRaw };
    }

    // En-tête court (2-6 chars alphanums) → sigle de site
    if (isSigle(cellNorm)) {
      const uc = cellNorm.toUpperCase();
      return { code: uc, label: uc, needsNaming: false };
    }

    // Token court dans libellé composé : "Livraison BIC", "Cmd ROB", "Qté NCA"
    const tokens = cellNorm.split(/[\s\-_()\/]+/).filter(Boolean);
    for (const t of tokens) {
      if (isSigle(t)) {
        const uc = t.toUpperCase();
        return { code: uc, label: uc, needsNaming: false };
      }
    }

    return null;
  };

  // Cherche la ligne d'en-têtes (plusieurs stratégies)
  let headerIdx = -1;
  let headers = null;
  for (let i = 0; i < Math.min(rows.length, 20); i++) {
    const row = rows[i].map(c => normCol(c));
    const hasDesig = row.some(c =>
      c.includes("designation") || c === "produit" || c === "libelle" ||
      c === "libellé" || c === "nom" || c === "article" ||
      c === "description" || c.includes("designation produit")
    );
    if (hasDesig) {
      headerIdx = i;
      headers = rows[i];
      break;
    }
  }
  if (headerIdx === -1) {
    for (let i = 0; i < Math.min(rows.length, 20); i++) {
      const row = rows[i].map(c => normCol(c));
      const hasQty = row.some(c =>
        c === "quantite" || c === "qte" || c === "qty" ||
        c === "uvc" || c === "cde en uvc" || c === "cde" ||
        c.includes("commande") || detectStoreColumn(null, c) !== null
      );
      const hasTextHeader = row.some(c => c.length > 0 && c.length < 50 && !/^\d+([.,]\d+)?$/.test(c));
      if (hasQty && hasTextHeader) {
        headerIdx = i;
        headers = rows[i];
        break;
      }
    }
  }
  if (headerIdx === -1) {
    throw new Error("Impossible de trouver une ligne d'en-têtes dans le fichier (cherché : produit/désignation/article/quantité/commande).");
  }

  // Map des colonnes : article, désignation, cmd, recue + storeColumns (dynamique)
  const colMap = {};
  let isG5Format = false;
  const articleAsCode = [];
  const storeColumns = []; // [{ idx, def: {code, label, needsNaming, ...} }]

  headers.forEach((h, idx) => {
    const n = normCol(h);
    if (!n) return;

    // Désignation prioritaire
    if (n.includes("designation") || n === "produit" || n === "libelle" || n === "libellé" ||
        n === "nom" || n === "description") {
      if (colMap.designation === undefined) colMap.designation = idx;
    }
    // "Article" ambigu
    else if (n === "article") {
      articleAsCode.push(idx);
    }
    // Code article
    else if (n === "code article" || n === "code" || n === "ref" ||
             n === "reference" || n === "référence") {
      if (colMap.article === undefined) colMap.article = idx;
    }
    // Commande globale (sans nom de magasin)
    else if (detectStoreColumn(null, n) === null && (n.includes("cmd") || n === "commande" ||
             (n.includes("commande") && !detectStoreColumn(null, n)))) {
      if (colMap.cmd === undefined) colMap.cmd = idx;
    }
    // Réception
    else if (n.includes("recept") || n.includes("recu") || n === "reçu") {
      if (colMap.recue === undefined) colMap.recue = idx;
    }
    // Magasin (connu ou inconnu)
    else {
      const def = detectStoreColumn(h, n);
      if (def) {
        storeColumns.push({ idx, def });
        if (n.startsWith("magasin")) isG5Format = true;
      }
    }
  });

  // Article ambigu : code (chiffres) ou désignation (texte) ?
  if (colMap.designation === undefined && articleAsCode.length > 0) {
    const articleIdx = articleAsCode[0];
    let textCount = 0, numericCount = 0;
    for (let i = headerIdx + 1; i < Math.min(headerIdx + 6, rows.length); i++) {
      const v = (rows[i] && rows[i][articleIdx]) ? String(rows[i][articleIdx]).trim() : "";
      if (!v) continue;
      if (/^\d{6,}$/.test(v)) numericCount++;
      else if (v.length > 5 && /[a-zA-Z]/.test(v)) textCount++;
    }
    if (textCount > numericCount) {
      colMap.designation = articleIdx;
    } else if (colMap.article === undefined) {
      colMap.article = articleIdx;
    }
  }

  // Fallback désignation : colonne avec le plus de texte long
  if (colMap.designation === undefined) {
    const usedCols = new Set([
      colMap.article, colMap.cmd, colMap.recue,
      ...storeColumns.map(s => s.idx)
    ].filter(x => x !== undefined));
    let bestIdx = -1, bestAvgLen = 0;
    for (let c = 0; c < headers.length; c++) {
      if (usedCols.has(c)) continue;
      let totalLen = 0, count = 0;
      for (let i = headerIdx + 1; i < Math.min(headerIdx + 11, rows.length); i++) {
        const v = (rows[i] && rows[i][c]) ? String(rows[i][c]).trim() : "";
        if (!v) continue;
        if (/^[\d\s.,]+$/.test(v)) continue;
        totalLen += v.length;
        count++;
      }
      const avg = count > 0 ? totalLen / count : 0;
      if (avg > bestAvgLen && avg > 8) {
        bestAvgLen = avg;
        bestIdx = c;
      }
    }
    if (bestIdx !== -1) colMap.designation = bestIdx;
  }

  // Si aucun magasin trouvé → cherche colonne quantité générique
  // L'admin devra nommer cette colonne (needsNaming = true)
  if (storeColumns.length === 0) {
    let quantityColIdx = -1;
    headers.forEach((h, idx) => {
      const n = normCol(h);
      if (!n) return;
      if (idx === colMap.article || idx === colMap.designation ||
          idx === colMap.cmd || idx === colMap.recue) return;
      if (quantityColIdx === -1 && (
        n === "quantite" || n === "qte" || n === "qty" ||
        n === "commande en uvc" || n === "uvc" || n === "uc" ||
        n === "cde en uvc" || n === "cde" ||
        n.includes("cde en uvc") || n.includes("commande en uvc") ||
        (n.includes("quantite") && !n.includes("recept")) ||
        (n.includes("commande") && !detectStoreColumn(null, n)) ||
        (n.startsWith("cde") && !detectStoreColumn(null, n))
      )) {
        quantityColIdx = idx;
      }
    });
    if (quantityColIdx !== -1) {
      storeColumns.push({
        idx: quantityColIdx,
        def: {
          code: `COL_${quantityColIdx}`,
          label: String(headers[quantityColIdx] || "Colonne quantité").trim(),
          needsNaming: true,
          originalHeader: headers[quantityColIdx]
        }
      });
    } else if (colMap.cmd !== undefined) {
      // Fallback : on prend la colonne CMD
      storeColumns.push({
        idx: colMap.cmd,
        def: {
          code: `COL_${colMap.cmd}`,
          label: String(headers[colMap.cmd] || "Commande").trim(),
          needsNaming: true,
          originalHeader: headers[colMap.cmd]
        }
      });
      colMap.cmd = undefined;
    }
  }

  if (colMap.designation === undefined) {
    throw new Error("Impossible de trouver une colonne désignation/produit dans le fichier.");
  }
  if (storeColumns.length === 0) {
    throw new Error("Aucune colonne de quantité/magasin trouvée dans le fichier.");
  }

  // Parse les lignes produit
  const products = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.every(c => c === "" || c === null || c === undefined)) continue;

    const designation = (row[colMap.designation] || "").toString().trim();
    if (!designation) continue;

    // Ignore lignes totaux
    const desigLower = stripAccents(designation.toLowerCase());
    if (desigLower.includes("montant ht") || desigLower.includes("montant ttc") ||
        desigLower.includes("montant tva") || desigLower === "total" || desigLower === "totaux") {
      continue;
    }

    const parse = isG5Format ? parseG5Cell : (v) => {
      if (v === "" || v === null || v === undefined) return 0;
      const s = v.toString().trim();
      // Détecte le format G5 à la volée sur le contenu de la cellule
      // (cas où les en-têtes sont ROB/TOL/BIC mais les valeurs sont au format G5)
      if (s.includes("|||")) return parseG5Cell(s);
      const m = s.match(/^(\d+)\s*u/);
      if (m) return parseInt(m[1], 10);
      const cleaned = s.replace(",", ".");
      const n = parseFloat(cleaned);
      return isNaN(n) ? 0 : Math.round(n);
    };

    // Construit le map des quantités par magasin
    const stores = {};
    let total = 0;
    for (const sc of storeColumns) {
      const q = parse(row[sc.idx]);
      stores[sc.def.code] = q;
      total += q;
    }

    if (total === 0) continue; // ligne sans quantité

    let recue;
    if (colMap.recue !== undefined) {
      recue = parse(row[colMap.recue]);
    } else {
      recue = total;
    }

    let cmd;
    if (colMap.cmd !== undefined) {
      cmd = parse(row[colMap.cmd]);
    } else {
      cmd = recue;
    }

    products.push({
      article: colMap.article !== undefined ? (row[colMap.article] || "").toString().trim() : "",
      designation,
      cmd,
      recue,
      stores // map { CODE: quantité }
    });
  }

  // Calcule le total de chaque colonne magasin
  const storeTotals = {};
  storeColumns.forEach(sc => { storeTotals[sc.def.code] = 0; });
  products.forEach(p => {
    storeColumns.forEach(sc => {
      storeTotals[sc.def.code] += (p.stores[sc.def.code] || 0);
    });
  });

  // Ignore les colonnes magasin INCONNUES dont le total est 0
  // (ex: Magasin 05 sans commande aujourd'hui → on ne demande pas son nom)
  const keptStoreCols = storeColumns.filter(sc => {
    if (sc.def.needsNaming && storeTotals[sc.def.code] === 0) {
      return false; // colonne inconnue et vide → on l'ignore
    }
    return true;
  });

  // Nettoie aussi les produits : retire les clés des magasins qu'on ignore
  const removedCodes = storeColumns
    .filter(sc => !keptStoreCols.some(k => k.def.code === sc.def.code))
    .map(sc => sc.def.code);
  if (removedCodes.length > 0) {
    products.forEach(p => {
      removedCodes.forEach(code => { delete p.stores[code]; });
    });
  }

  // Retourne aussi les définitions de magasins (pour l'écran de nommage si besoin)
  return { products, storeColumns: keptStoreCols.map(s => s.def) };
}


/* =========================================================================
   FIREBASE / STATE SYNC
   ========================================================================= */

// Une session = un dispatch en cours, identifiée par un sessionId
// Structure dans Firebase:
//   /dispatch/{sessionId}/meta : { supplier, startedAt, operators: [...], products: [...] }
//   /dispatch/{sessionId}/state/{productKey} : { done, doneBy, doneAt, lockedBy, lockedAt, qtyRob, qtyTol, qtyPdp }

function useFirebaseSession(sessionId, operatorName) {
  const [state, setState] = useState({});
  const [meta, setMeta] = useState(null);
  const [connected, setConnected] = useState(false);

  useEffect(() => {
    if (!firebaseReady || !sessionId) return;

    const stateRef = db.ref(`dispatch/${sessionId}/state`);
    const metaRef = db.ref(`dispatch/${sessionId}/meta`);
    const connectedRef = db.ref(".info/connected");

    const onState = (snap) => setState(snap.val() || {});
    const onMeta = (snap) => setMeta(snap.val() || null);
    const onConn = (snap) => setConnected(!!snap.val());

    stateRef.on("value", onState);
    metaRef.on("value", onMeta);
    connectedRef.on("value", onConn);

    return () => {
      stateRef.off("value", onState);
      metaRef.off("value", onMeta);
      connectedRef.off("value", onConn);
    };
  }, [sessionId]);

  // Mise à jour locale (fallback si pas Firebase)
  const updateLocal = useCallback((key, patch) => {
    setState(prev => ({ ...prev, [key]: { ...(prev[key] || {}), ...patch } }));
  }, []);

  const lockRow = useCallback((key) => {
    const patch = { lockedBy: operatorName, lockedAt: Date.now() };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, operatorName, updateLocal]);

  const unlockRow = useCallback((key) => {
    const patch = { lockedBy: null, lockedAt: null };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, updateLocal]);

  const validateRow = useCallback((key, qtys) => {
    const patch = {
      done: true,
      doneBy: operatorName,
      doneAt: Date.now(),
      lockedBy: null,
      lockedAt: null,
      ...(qtys || {})
    };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, operatorName, updateLocal]);

  const undoRow = useCallback((key) => {
    const patch = { done: false, doneBy: null, doneAt: null };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/state/${key}`).update(patch);
    } else {
      updateLocal(key, patch);
    }
  }, [sessionId, updateLocal]);

  const initSession = useCallback((supplier, products) => {
    const metaData = {
      supplier,
      startedAt: Date.now(),
      products,
    };
    if (firebaseReady && sessionId) {
      db.ref(`dispatch/${sessionId}/meta`).set(metaData);
    } else {
      setMeta(metaData);
    }
  }, [sessionId]);

  return { state, meta, connected: firebaseReady ? connected : true, lockRow, unlockRow, validateRow, undoRow, initSession };
}

   COMPOSANTS
   ========================================================================= */

function LoginScreen({ onLogin }) {
  const [name, setName] = useState(localStorage.getItem("dispatch_operator") || "");

  const submit = () => {
    if (!name.trim()) return;
    localStorage.setItem("dispatch_operator", name.trim());
    onLogin(name.trim());
  };

  return (
    <div className="screen-center">
      <div className="logo">Kelbongoo</div>
      <div className="tag">Dispatch Palette</div>
      <div className="card">
        <div className="field">
          <label>Ton prénom</label>
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Ex: Marie"
            autoFocus
            onKeyDown={(e) => e.key === "Enter" && submit()}
          />
        </div>
        <button className="btn-primary" onClick={submit} disabled={!name.trim()}>
          Continuer
        </button>
      </div>
    </div>
  );
}

function UploadScreen({ operator, onSessionStart, onJoinSession, onOpenAdmin, onLogout, onNeedsNaming, onBackToMode, onReset }) {
  const [error, setError] = useState("");
  const [supplierName, setSupplierName] = useState("");
  const [pendingFile, setPendingFile] = useState(null);
  const fileRef = useRef(null);

  // État du chargement BDC depuis Drive
  const [showBdcModal, setShowBdcModal] = useState(false);
  const [bdcList, setBdcList] = useState([]);
  const [bdcLoading, setBdcLoading] = useState(false);
  const [bdcError, setBdcError] = useState("");
  const [bdcSupplier, setBdcSupplier] = useState("");
  const [loadingBdcId, setLoadingBdcId] = useState(null);

  // Vérifie si une session est déjà active (sessions non terminées, peu importe l'âge)
  const [activeSessions, setActiveSessions] = useState([]);
  useEffect(() => {
    if (!firebaseReady) return;
    const ref = db.ref("dispatch");
    const handler = (snap) => {
      const all = snap.val() || {};
      const recent = [];
      Object.entries(all).forEach(([sid, s]) => {
        if (s.meta && s.meta.startedAt) {
          const total = (s.meta.products || []).length;
          const done = Object.values(s.state || {}).filter(x => x && x.done).length;
          // On affiche TOUTES les sessions non terminées (pas de filtre temps)
          if (done < total) {
            recent.push({ id: sid, supplier: s.meta.supplier, startedAt: s.meta.startedAt, total, done });
          }
        }
      });
      recent.sort((a,b) => b.startedAt - a.startedAt);
      setActiveSessions(recent);
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  // Charge la liste des BDC depuis Apps Script
  const openBdcModal = async () => {
    setShowBdcModal(true);
    setBdcLoading(true);
    setBdcError("");
    setBdcList([]);
    try {
      // Apps Script avec no-cors ne renvoie pas de réponse lisible, donc on doit utiliser GET
      const url = `${APPS_SCRIPT_URL}?action=list-bdcs`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.success) {
        setBdcList(data.bdcs || []);
        if ((data.bdcs || []).length === 0) {
          setBdcError("Aucun BDC trouvé dans le dossier Drive (modifié dans les 3 derniers jours, nom contenant 'BDC').");
        }
      } else {
        setBdcError(data.error || "Erreur inconnue");
      }
    } catch (e) {
      setBdcError(`Impossible de charger la liste : ${e.message}`);
    } finally {
      setBdcLoading(false);
    }
  };

  const loadBdc = async (bdc) => {
    if (!bdcSupplier.trim()) {
      setBdcError("Indique d'abord le nom du fournisseur (qui apparaîtra sur les BL).");
      return;
    }
    setLoadingBdcId(bdc.id);
    setBdcError("");
    try {
      const url = `${APPS_SCRIPT_URL}?action=get-bdc&fileId=${encodeURIComponent(bdc.id)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || "Erreur de chargement du BDC");

      // Construit un workbook compatible avec le parseur existant
      const ws = XLSX.utils.aoa_to_sheet(data.rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "BDC");

      const { products, storeColumns } = parseExcelFile(wb);
      if (products.length === 0) {
        throw new Error("Aucun produit reconnu dans ce BDC (vérifie les en-têtes de colonnes).");
      }

      const supplier = bdcSupplier.trim();
      const needsNaming = storeColumns.some(s => s.needsNaming);
      if (needsNaming) {
        setShowBdcModal(false);
        setBdcSupplier("");
        onNeedsNaming({ supplier, products, storeColumns });
        return;
      }
      const sessionId = `${stripAccents(supplier).replace(/[^a-zA-Z0-9]/g, "_").toLowerCase()}_${Date.now()}`;
      setShowBdcModal(false);
      setBdcSupplier("");
      onSessionStart(sessionId, supplier, products, storeColumns);
    } catch (e) {
      setBdcError(e.message);
    } finally {
      setLoadingBdcId(null);
    }
  };

  const handleFileSelected = (file) => {
    if (!file) return;
    if (!supplierName.trim()) {
      setError("Indique d'abord le nom du fournisseur avant de charger le fichier.");
      // Garde le fichier en mémoire pour quand le nom sera entré
      setPendingFile(file);
      return;
    }
    processFile(file, supplierName.trim());
  };

  const processFile = async (file, supplier) => {
    setError("");
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const { products, storeColumns } = parseExcelFile(wb);
      if (products.length === 0) {
        setError("Aucun produit trouvé dans le fichier.");
        return;
      }
      // Si des magasins ont besoin d'être nommés, on passe par l'écran de nommage
      const needsNaming = storeColumns.some(s => s.needsNaming);
      if (needsNaming) {
        onNeedsNaming({ supplier, products, storeColumns });
        return;
      }
      const sessionId = `${stripAccents(supplier).replace(/[^a-zA-Z0-9]/g, "_").toLowerCase()}_${Date.now()}`;
      onSessionStart(sessionId, supplier, products, storeColumns);
    } catch (e) {
      setError(`Erreur de lecture: ${e.message}`);
    }
  };

  // Si le user a maintenant entré le nom et qu'on avait un fichier en attente
  const handleSupplierConfirm = () => {
    if (!supplierName.trim()) {
      setError("Le nom du fournisseur est obligatoire.");
      return;
    }
    if (pendingFile) {
      processFile(pendingFile, supplierName.trim());
      setPendingFile(null);
    } else {
      fileRef.current?.click();
    }
  };

  return (
    <div className="screen-center">
      <div className="logo">Kelbongoo</div>
      <div className="tag">Bonjour {operator} 👋</div>

      <div className="card">
        <h3 style={{margin: "0 0 12px 0", fontSize: 15}}>Démarrer un nouveau dispatch</h3>

        <div className="field">
          <label>Nom du fournisseur *</label>
          <input
            type="text"
            value={supplierName}
            onChange={(e) => { setSupplierName(e.target.value); setError(""); }}
            placeholder="Ex: SYMBIOSE, GABORIT, TERRE D'OC..."
            style={{textTransform: "uppercase"}}
          />
        </div>

        <div
          className="upload-zone"
          onClick={() => {
            if (!supplierName.trim()) {
              setError("⚠️ Saisis d'abord le nom du fournisseur");
              return;
            }
            fileRef.current?.click();
          }}
          style={{opacity: supplierName.trim() ? 1 : 0.5}}
        >
          <div className="icon">📥</div>
          <div className="label">Charger le fichier Excel</div>
          <div className="hint">.xlsx ou .xls</div>
        </div>
        <input
          ref={fileRef}
          type="file"
          accept=".xlsx,.xls"
          style={{display: "none"}}
          onChange={(e) => handleFileSelected(e.target.files[0])}
        />
        {error && <div style={{color: "#d32f2f", fontSize: 13, marginTop: 12}}>{error}</div>}
      </div>

      {activeSessions.length > 0 && (
        <div className="card" style={{marginTop: 16}}>
          <h3 style={{margin: "0 0 12px 0", fontSize: 15}}>Rejoindre un dispatch en cours</h3>
          {activeSessions.map(s => (
            <button
              key={s.id}
              className="btn-secondary"
              style={{textAlign: "left", padding: 14, marginBottom: 6}}
              onClick={() => onJoinSession(s.id)}
            >
              <div style={{fontWeight: 700, marginBottom: 2}}>{s.supplier}</div>
              <div style={{fontSize: 11, color: "#666"}}>
                Démarré à {fmtTime(s.startedAt)} • {s.done}/{s.total} produits faits
              </div>
            </button>
          ))}
        </div>
      )}

      {isAdmin(operator) && (
        <div style={{marginTop: 16, width: "100%", maxWidth: 360}}>
          <button
            className="btn-secondary"
            onClick={onOpenAdmin}
            style={{background: "#1a4d2e", color: "#fff", fontWeight: 700, padding: 14}}
          >
            🔐 Mode Admin
          </button>
          <button
            className="btn-secondary"
            onClick={openBdcModal}
            style={{background: "#5e35b1", color: "#fff", fontWeight: 700, padding: 14, marginTop: 8}}
          >
            📋 Charger un BDC depuis Drive
          </button>
        </div>
      )}

      <div style={{marginTop: 12, width: "100%", maxWidth: 360}}>
        {onBackToMode && (
          <button
            className="btn-secondary"
            onClick={onBackToMode}
            style={{fontSize: 13}}
          >
            ← Changer de mode
          </button>
        )}
        {onReset && (
          <button
            className="btn-secondary"
            onClick={onReset}
            style={{fontSize: 13, color: "#c62828", borderColor: "#ffcdd2"}}
          >
            🔄 Réinitialiser (vider le cache)
          </button>
        )}
        <button
          className="btn-secondary"
          onClick={onLogout}
          style={{fontSize: 13, color: "#666"}}
        >
          ↪ Se déconnecter ({operator})
        </button>
      </div>

      {!firebaseReady && (
        <div style={{fontSize: 11, color: "#999", marginTop: 16, textAlign: "center", maxWidth: 360}}>
          ⚠️ Firebase non configuré. Mode local uniquement (pas de partage temps réel).
        </div>
      )}

      {/* Modal de chargement BDC */}
      {showBdcModal && (
        <div className="modal-backdrop" onClick={() => !loadingBdcId && setShowBdcModal(false)}>
          <div className="modal" onClick={(e) => e.stopPropagation()} style={{maxWidth: 500}}>
            <h3>📋 Charger un BDC depuis Drive</h3>
            <p style={{fontSize: 12, color: "#666", margin: "0 0 12px 0"}}>
              BDC des 3 derniers jours dans le dossier Drive Kelbongoo.
            </p>

            <div className="field">
              <label>Nom du fournisseur *</label>
              <input
                type="text"
                value={bdcSupplier}
                onChange={(e) => { setBdcSupplier(e.target.value); setBdcError(""); }}
                placeholder="Ex: LE FLEURY"
                style={{textTransform: "uppercase"}}
              />
            </div>

            {bdcLoading && (
              <div style={{textAlign: "center", padding: 20, color: "#666"}}>
                Chargement de la liste...
              </div>
            )}

            {!bdcLoading && bdcList.length > 0 && (
              <div style={{maxHeight: 400, overflowY: "auto", marginBottom: 12}}>
                {bdcList.map(bdc => (
                  <button
                    key={bdc.id}
                    onClick={() => loadBdc(bdc)}
                    disabled={loadingBdcId !== null}
                    style={{
                      width: "100%",
                      textAlign: "left",
                      padding: 12,
                      marginBottom: 6,
                      background: loadingBdcId === bdc.id ? "#e8f5e9" : "#f4f5f7",
                      border: "1.5px solid " + (loadingBdcId === bdc.id ? "#1a4d2e" : "#e6e8ec"),
                      borderRadius: 8,
                      cursor: loadingBdcId !== null ? "wait" : "pointer",
                      opacity: loadingBdcId !== null && loadingBdcId !== bdc.id ? 0.5 : 1
                    }}
                  >
                    <div style={{fontWeight: 700, fontSize: 13, marginBottom: 2}}>
                      {loadingBdcId === bdc.id ? "⏳ " : "📄 "}{bdc.name}
                    </div>
                    <div style={{fontSize: 11, color: "#666"}}>
                      Modifié le {bdc.modifiedStr}
                    </div>
                  </button>
                ))}
              </div>
            )}

            {bdcError && (
              <div style={{
                color: "#c62828",
                background: "#ffebee",
                padding: 10,
                borderRadius: 6,
                fontSize: 12,
                marginBottom: 12
              }}>
                {bdcError}
              </div>
            )}

            <div className="modal-actions">
              <button
                className="btn-cancel"
                onClick={() => setShowBdcModal(false)}
                disabled={loadingBdcId !== null}
              >
                Annuler
              </button>
              <button
                className="btn-confirm"
                onClick={openBdcModal}
                disabled={bdcLoading || loadingBdcId !== null}
              >
                🔄 Actualiser
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ProductCard({ product, pkey, status, operator, storeColumns, onLock, onUnlock, onValidate, onUndo, onEdit }) {
  const isLocked = status.lockedBy && status.lockedBy !== operator;
  const lockExpired = status.lockedAt && (Date.now() - status.lockedAt) > LOCK_DURATION_MS;
  const reallyLocked = isLocked && !lockExpired;
  const isDone = status.done;
  const isMine = status.lockedBy === operator && !lockExpired;

  // Quantités effectives (peuvent avoir été modifiées via le modal)
  // status.qtyStores = { CODE: qty, ... }  ou ancien format status.qtyRob/Tol/Pdp
  const getQty = (code) => {
    if (status.qtyStores && status.qtyStores[code] !== undefined) {
      return status.qtyStores[code];
    }
    // Fallback : la valeur initiale du produit (parsée du fichier)
    return (product.stores && product.stores[code]) || 0;
  };
  const recue = status.qtyRecue !== undefined ? status.qtyRecue : product.recue;

  // Construit le map de quantités effectives pour la validation
  const effectiveQtyStores = {};
  storeColumns.forEach(s => {
    effectiveQtyStores[s.code] = getQty(s.code);
  });

  const cls = `product-card ${isDone ? "done" : ""} ${reallyLocked ? "locked" : ""} ${isMine ? "mine" : ""}`;

  const handleClaim = () => {
    if (isDone || reallyLocked) return;
    if (isMine) {
      onUnlock(pkey);
    } else {
      onLock(pkey);
    }
  };

  // Grille adaptative : 3 cols si <=3 magasins, 2 cols sinon
  const nbStores = storeColumns.length;
  const gridCols = nbStores <= 3 ? `repeat(${nbStores}, 1fr)` : "repeat(2, 1fr)";

  return (
    <div className={cls}>
      {reallyLocked && (
        <div className="lock-badge">🔒 {status.lockedBy} s'en occupe</div>
      )}
      {isMine && !isDone && (
        <div className="lock-badge" style={{background: "#1a4d2e"}}>
          ✋ Tu t'en occupes (tape à nouveau le nom pour libérer)
        </div>
      )}
      {isDone && (
        <div className="done-badge">
          ✓ {status.doneBy} • {fmtTime(status.doneAt)}
        </div>
      )}

      <div
        className="designation"
        onClick={handleClaim}
        style={{
          cursor: (!isDone && !reallyLocked) ? "pointer" : "default",
          userSelect: "none"
        }}
      >
        {product.designation}
      </div>

      <div className="product-meta">
        {product.article && <span className="article">{product.article}</span>}
        <span className="recu">Reçu: {recue}</span>
        {!isDone && !reallyLocked && (
          <button
            onClick={(e) => { e.stopPropagation(); onEdit(pkey, true); }}
            style={{
              background: "#fff3e0", border: "1px solid #ffcc80",
              borderRadius: 4, padding: "2px 6px", fontSize: 10,
              color: "#e65100", fontWeight: 700, cursor: "pointer"
            }}
          >
            ✎ Modifier reçu
          </button>
        )}
      </div>

      {/* Sur la carte : on masque les locaux à 0 pour ne montrer que ce qui est à dispatcher.
          Le modal d'édition (EditModal) affiche toujours tous les locaux. */}
      {(() => {
        const visibleCols = storeColumns.filter(s => effectiveQtyStores[s.code] > 0);
        const displayCols = visibleCols.length > 0 ? visibleCols : storeColumns; // fallback : tout afficher si tout est à 0
        const gridCols2 = `repeat(${displayCols.length}, 1fr)`;
        return (
          <div className="dest-row" style={{gridTemplateColumns: gridCols2}}>
            {displayCols.map(s => {
              const q = effectiveQtyStores[s.code];
              return (
                <div className="dest-cell" key={s.code}>
                  <div className="name">{s.label}</div>
                  <div className="qty">{q}</div>
                </div>
              );
            })}
          </div>
        );
      })()}

      {!isDone && !reallyLocked && (
        <div className="actions-row">
          <button
            className="btn-validate"
            onClick={() => onValidate(pkey, { qtyStores: effectiveQtyStores, qtyRecue: recue })}
          >
            ✓ Dispatché
          </button>
          <button className="btn-edit" onClick={() => onEdit(pkey, false)}>
            ✎
          </button>
        </div>
      )}

      {isDone && (
        <div className="actions-row">
          <button className="btn-undo" onClick={() => onUndo(pkey)}>
            Annuler
          </button>
        </div>
      )}

      {reallyLocked && (
        <div style={{fontSize: 12, color: "#888", textAlign: "center", padding: "8px 0"}}>
          {status.lockedBy} est en train de s'en occuper...
        </div>
      )}
    </div>
  );
}

function EditModal({ product, status, storeColumns, onSave, onClose, allowReceivedEdit }) {
  // Quantités par magasin en string pour gérer la saisie
  const getInitial = (code) => {
    if (status.qtyStores && status.qtyStores[code] !== undefined) return String(status.qtyStores[code]);
    if (code === "ROB" && status.qtyRob !== undefined) return String(status.qtyRob);
    if (code === "TOL" && status.qtyTol !== undefined) return String(status.qtyTol);
    if (code === "PDP" && status.qtyPdp !== undefined) return String(status.qtyPdp);
    return String((product.stores && product.stores[code]) || 0);
  };

  const [qties, setQties] = useState(() => {
    const init = {};
    storeColumns.forEach(s => { init[s.code] = getInitial(s.code); });
    return init;
  });
  const [recue, setRecue] = useState(String(status.qtyRecue !== undefined ? status.qtyRecue : product.recue));

  const toNum = (s) => {
    if (s === "" || s === null || s === undefined) return 0;
    const n = parseInt(s, 10);
    return isNaN(n) ? 0 : n;
  };

  const handleNumChange = (code) => (e) => {
    const v = e.target.value;
    if (v === "" || /^\d+$/.test(v)) {
      setQties(prev => ({ ...prev, [code]: v }));
    }
  };

  const handleRecueChange = (e) => {
    const v = e.target.value;
    if (v === "" || /^\d+$/.test(v)) setRecue(v);
  };

  const recueN = toNum(recue);
  let total = 0;
  const numQties = {};
  storeColumns.forEach(s => {
    const n = toNum(qties[s.code]);
    numQties[s.code] = n;
    total += n;
  });
  const gap = total - recueN;

  const handleSave = () => {
    onSave({ qtyStores: numQties, qtyRecue: recueN });
  };

  // Adapte la grille selon nombre de magasins
  const nbStores = storeColumns.length;
  const gridCols = nbStores <= 3 ? `repeat(${nbStores}, 1fr)` : "repeat(2, 1fr)";

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Ajuster les quantités</h3>
        <div className="designation-modal">{product.designation}</div>

        {allowReceivedEdit && (
          <div style={{
            background: "#fff3e0", padding: 10, borderRadius: 8,
            marginBottom: 12, border: "1px solid #ffcc80"
          }}>
            <div style={{fontSize: 11, fontWeight: 700, color: "#e65100", marginBottom: 4}}>
              QUANTITÉ REÇUE (BL)
            </div>
            <input
              type="text"
              inputMode="numeric"
              pattern="[0-9]*"
              value={recue}
              onChange={handleRecueChange}
              onFocus={(e) => e.target.select()}
              style={{
                width: "100%", padding: 10, fontSize: 22, fontWeight: 700,
                textAlign: "center", border: "1.5px solid #ff9800",
                borderRadius: 6, background: "#fff"
              }}
            />
            <div style={{fontSize: 10, color: "#666", marginTop: 4, textAlign: "center"}}>
              Initial: {product.recue}
            </div>
          </div>
        )}

        <div style={{fontSize: 12, fontWeight: 600, color: "#666", marginBottom: 6}}>
          RÉPARTITION PAR MAGASIN
        </div>
        <div className="edit-grid" style={{gridTemplateColumns: gridCols}}>
          {storeColumns.map(s => (
            <div className="edit-cell" key={s.code}>
              <label>{s.label}</label>
              <input
                type="text"
                inputMode="numeric"
                pattern="[0-9]*"
                value={qties[s.code]}
                onChange={handleNumChange(s.code)}
                onFocus={(e) => e.target.select()}
              />
            </div>
          ))}
        </div>

        <div style={{
          fontSize: 12, marginBottom: 12, textAlign: "center",
          padding: 8, borderRadius: 6,
          background: gap === 0 ? "#e8f5e9" : "#ffebee",
          color: gap === 0 ? "#1a4d2e" : "#c62828",
          fontWeight: 600
        }}>
          Total réparti: {total} / Reçu: {recueN}
          {gap !== 0 && (
            <div style={{fontSize: 11, marginTop: 2}}>
              {gap > 0 ? `⚠️ Surplus de ${gap}` : `⚠️ Manque ${-gap}`}
            </div>
          )}
          {gap === 0 && <div style={{fontSize: 11, marginTop: 2}}>✓ Total cohérent</div>}
        </div>

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Annuler</button>
          <button className="btn-confirm" onClick={handleSave}>
            Valider
          </button>
        </div>
      </div>
    </div>
  );
}

function DispatchScreen({ sessionId, operator, supplier, products, storeColumns, onFinish, onLeave }) {
  const { state, meta, connected, lockRow, unlockRow, validateRow, undoRow } = useFirebaseSession(sessionId, operator);
  const [search, setSearch] = useState("");
  const [editingKey, setEditingKey] = useState(null);
  const [toast, setToast] = useState("");
  const [viewMode, setViewMode] = useState(localStorage.getItem("dispatch_view_mode") || "list"); // "list" | "scan"
  const [showDone, setShowDone] = useState(false); // onglet Dispatchés
  const searchInputRef = useRef(null);

  // FALLBACK CRITIQUE : si storeColumns est vide (vieille session, ou erreur),
  // on les reconstruit depuis les produits.
  // - Priorité 1 : storeColumns de la session Firebase (meta.storeColumns)
  // - Priorité 2 : storeColumns passé en prop
  // - Priorité 3 : reconstruit depuis les clés de products[0].stores
  // - Priorité 4 (compat ancien format): ROB/TOL/PDP par défaut si produits ont rob/tol/pdp
  const effectiveStoreColumns = useMemo(() => {
    // 1. Firebase meta
    if (meta && Array.isArray(meta.storeColumns) && meta.storeColumns.length > 0) {
      return meta.storeColumns;
    }
    // 2. Prop
    if (Array.isArray(storeColumns) && storeColumns.length > 0) {
      return storeColumns;
    }
    // 3. Reconstruction depuis products[0].stores
    if (products.length > 0 && products[0].stores) {
      return Object.keys(products[0].stores).map(code => ({
        code,
        label: code,
        needsNaming: false
      }));
    }
    // 4. Compat ancien format (rob/tol/pdp directement sur le produit)
    if (products.length > 0 && (products[0].rob !== undefined ||
        products[0].tol !== undefined || products[0].pdp !== undefined)) {
      return [
        { code: "ROB", label: "ROB", needsNaming: false },
        { code: "TOL", label: "TOL", needsNaming: false },
        { code: "PDP", label: "PDP", needsNaming: false }
      ];
    }
    return [];
  }, [meta, storeColumns, products]);

  // Adapte les produits pour qu'ils aient TOUS un champ `stores` (compat ancien format)
  const normalizedProducts = useMemo(() => {
    return products.map(p => {
      if (p.stores) return p;
      // Compat : si rob/tol/pdp directement → on construit stores
      const stores = {};
      if (p.rob !== undefined) stores["ROB"] = p.rob;
      if (p.tol !== undefined) stores["TOL"] = p.tol;
      if (p.pdp !== undefined) stores["PDP"] = p.pdp;
      return { ...p, stores };
    });
  }, [products]);

  // Sauvegarde le mode choisi
  useEffect(() => {
    localStorage.setItem("dispatch_view_mode", viewMode);
  }, [viewMode]);

  // Renouvelle le lock toutes les 10s sur les lignes que je tiens
  useEffect(() => {
    const t = setInterval(() => {
      Object.entries(state).forEach(([k, v]) => {
        if (v && v.lockedBy === operator && !v.done) {
          lockRow(k);
        }
      });
    }, LOCK_REFRESH_MS);
    return () => clearInterval(t);
  }, [state, operator, lockRow]);

  // Tri alphabétique - utilise normalizedProducts pour garantir le champ stores
  const sortedProducts = useMemo(() => {
    return normalizedProducts
      .map((p, idx) => ({ ...p, _pkey: productKey(p, idx) }))
      .sort((a, b) => a.designation.localeCompare(b.designation, "fr"));
  }, [normalizedProducts]);

  // Sépare les produits dispatchés des non dispatchés
  const { notDoneProducts, doneProducts } = useMemo(() => {
    const notDone = [];
    const done = [];
    sortedProducts.forEach(p => {
      if (state[p._pkey]?.done) done.push(p);
      else notDone.push(p);
    });
    return { notDoneProducts: notDone, doneProducts: done };
  }, [sortedProducts, state]);

  // Filtre par recherche selon l'onglet actif
  const filtered = useMemo(() => {
    const source = showDone ? doneProducts : notDoneProducts;
    if (!search.trim()) return source;
    const q = stripAccents(search.toLowerCase());
    return source.filter(p =>
      stripAccents(p.designation.toLowerCase()).includes(q) ||
      (p.article || "").includes(q)
    );
  }, [notDoneProducts, doneProducts, showDone, search]);

  const stats = useMemo(() => {
    const total = sortedProducts.length;
    const done = sortedProducts.filter(p => state[p._pkey]?.done).length;
    return { total, done, remaining: total - done };
  }, [sortedProducts, state]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 1500);
  };

  const handleValidate = (pkey, qtys) => {
    validateRow(pkey, qtys);
    showToast("✓ Validé");
  };

  const handleUndo = (pkey) => {
    undoRow(pkey);
    showToast("↶ Annulé");
  };

  // editMode peut être true = on autorise aussi la modif de la quantité reçue
  const [editAllowReceived, setEditAllowReceived] = useState(false);
  const handleEdit = (pkey, allowReceivedEdit) => {
    lockRow(pkey);
    setEditAllowReceived(!!allowReceivedEdit);
    setEditingKey(pkey);
  };

  const handleEditSave = (qtys) => {
    if (editingKey) {
      validateRow(editingKey, qtys);
      showToast("✓ Ajusté et validé");
    }
    setEditingKey(null);
  };

  const handleEditCancel = () => {
    if (editingKey) unlockRow(editingKey);
    setEditingKey(null);
  };

  const editingProduct = editingKey ? sortedProducts.find(p => p._pkey === editingKey) : null;

  // Quand on est en mode scan et qu'on valide, on vide la recherche pour le prochain produit
  const handleValidateScan = (pkey, qtys) => {
    handleValidate(pkey, qtys);
    if (viewMode === "scan") {
      setSearch("");
      setTimeout(() => searchInputRef.current?.focus(), 50);
    }
  };

  // Re-télécharge un xlsx reconstruit depuis les données en mémoire
  const downloadBdc = () => {
    const header = ["Article", "Désignation", "Quantité reçue", ...storeColumns.map(s => s.label)];
    const dataRows = sortedProducts.map(p => [
      p.article || "",
      p.designation || "",
      p.received ?? "",
      ...storeColumns.map(s => p.stores?.[s.code] ?? 0)
    ]);
    const ws = XLSX.utils.aoa_to_sheet([header, ...dataRows]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dispatch");
    const clean = (s) => (s || "").replace(/[^a-zA-Z0-9_\-]/g, "_");
    XLSX.writeFile(wb, `Dispatch_${clean(supplier)}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  return (
    <div className="app">
      <div className="header">
        <div className="header-row">
          <div>
            <h1>{supplier}</h1>
            <div className="sub">
              {operator} • <span className={`conn-status ${!connected ? "offline" : ""}`}>
                {connected ? "● en ligne" : "● hors ligne"}
              </span>
            </div>
          </div>
          <div className="header-actions">
            <button
              className="header-btn"
              onClick={downloadBdc}
              title="Re-télécharger le fichier"
              style={{background: "rgba(255,255,255,.15)"}}
            >
              ⬇ BL
            </button>
            <button
              className="header-btn"
              onClick={() => setViewMode(viewMode === "list" ? "scan" : "list")}
              style={{background: viewMode === "scan" ? "#ffb300" : "rgba(255,255,255,.15)"}}
            >
              {viewMode === "scan" ? "📋 Mode liste" : "⚡ Mode scan"}
            </button>
            <button className="header-btn" onClick={onLeave}>Quitter</button>
          </div>
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{width: `${stats.total > 0 ? (stats.done/stats.total)*100 : 0}%`}}></div>
        </div>
        <div className="progress-text" style={{color: "rgba(255,255,255,.85)"}}>
          <span>{stats.done} / {stats.total} produits</span>
          <span>{stats.remaining} restants</span>
        </div>
      </div>

      {/* Onglets À faire / Dispatchés */}
      <div className="tabs-bar">
        <button
          className={`tab ${!showDone ? "active" : ""}`}
          onClick={() => { setShowDone(false); setSearch(""); }}
        >
          À faire ({notDoneProducts.length})
        </button>
        <button
          className={`tab ${showDone ? "active" : ""}`}
          onClick={() => { setShowDone(true); setSearch(""); }}
        >
          ✓ Dispatchés ({doneProducts.length})
        </button>
      </div>

      {/* Mode SCAN : recherche géante centrée, peu de résultats */}
      {viewMode === "scan" && !showDone && (
        <div className="scan-mode">
          <div className="scan-search-wrap">
            <input
              ref={searchInputRef}
              className="scan-search-input"
              type="text"
              placeholder="Tape 2-3 lettres..."
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              autoFocus
            />
            {search && (
              <button className="scan-clear" onClick={() => { setSearch(""); searchInputRef.current?.focus(); }}>
                ✕
              </button>
            )}
          </div>

          {!search.trim() && (
            <div className="scan-hint">
              <div style={{fontSize: 40, marginBottom: 8}}>⚡</div>
              <div style={{fontWeight: 600, marginBottom: 4}}>Mode scan rapide</div>
              <div style={{fontSize: 13, color: "#666"}}>
                Tape les premières lettres du produit que tu tiens dans la main
              </div>
              <div style={{fontSize: 12, color: "#999", marginTop: 12}}>
                {notDoneProducts.length} produits restants
              </div>
            </div>
          )}

          {search.trim() && filtered.length === 0 && (
            <div className="scan-hint">
              <div style={{fontSize: 30, marginBottom: 8}}>🔍</div>

              <div style={{fontSize: 12, color: "#aaa", marginTop: 8}}>

          {search.trim() && filtered.length > 0 && (
            <div className="scan-results">

            {filtered.map(p => (
              <ProductCard

                product={p}
